<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Task Manager</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

h1{
margin-bottom:20px;
}

.task{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:8px;
}

button{
padding:10px;
margin-top:10px;
}

textarea{
width:100%;
height:60px;
}

</style>

</head>

<body>

<h1>Task Manager</h1>

<textarea id="taskInput" placeholder="Escreva a tarefa..."></textarea>

<button onclick="createTask()">Criar tarefa</button>

<button onclick="loadTasks()">Sincronizar Notion</button>

<div id="tasks"></div>

<script src="app.js"></script>

</body>
</html>
