<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<title>COFIT Task Manager</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-4xl mx-auto p-8">

<h1 class="text-3xl font-bold mb-6">COFIT Task Manager</h1>

<div class="bg-white rounded-xl shadow p-4 mb-6">

<textarea
id="taskInput"
placeholder="Descreva rapidamente a tarefa..."
class="w-full border rounded p-3 mb-3"
></textarea>

<div class="flex gap-2">
<button
onclick="createTask()"
class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
>
Criar tarefa
<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 mt-6">

<div class="bg-gray-100 rounded-lg p-4">
<h2 class="font-bold mb-4 text-gray-700">Backlog</h2>
<div id="col-backlog" class="space-y-3"></div>
</div>

<div class="bg-blue-50 rounded-lg p-4">
<h2 class="font-bold mb-4 text-blue-700">A fazer</h2>
<div id="col-todo" class="space-y-3"></div>
</div>

<div class="bg-yellow-50 rounded-lg p-4">
<h2 class="font-bold mb-4 text-yellow-700">Em andamento</h2>
<div id="col-progress" class="space-y-3"></div>
</div>

<div class="bg-green-50 rounded-lg p-4">
<h2 class="font-bold mb-4 text-green-700">Concluído</h2>
<div id="col-done" class="space-y-3"></div>
</div>

</div>
</div>
Sincronizar Notion
</button>
</div>

</div>

<div id="tasks" class="space-y-3"></div>

</div>

<script src="app.js"></script>

</body>
</html>
