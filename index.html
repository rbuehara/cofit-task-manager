<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>COFIT Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: 'DM Sans', sans-serif; background: #f4f5f7; min-height: 100vh; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
button { cursor: pointer; font-family: inherit; }
button:hover { filter: brightness(0.93); }
input:focus, textarea:focus, select:focus { border-color: #4f46e5 !important; outline: none; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
.card-wrap:hover .hover-actions { display: flex !important; }

/* ── Mobile layout ── */
.desktop-only { display: flex; }
.mobile-only  { display: none; }
.fab { display: none; }
@media (max-width: 639px) {
  .desktop-only { display: none !important; }
  .mobile-only  { display: flex !important; }
  .fab {
    display: flex;
    position: fixed; bottom: 22px; right: 22px; z-index: 500;
    width: 52px; height: 52px; border-radius: 50%;
    background: #4f46e5; color: #fff; border: none;
    font-size: 26px; line-height: 1; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(79,70,229,0.45);
    cursor: pointer; font-family: inherit;
  }
  .fab:hover { filter: brightness(0.9); }
  .mobile-add-backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    z-index: 490; backdrop-filter: blur(4px);
  }
  .mobile-add-modal {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
    background: #fff; border-radius: 16px 16px 0 0;
    padding: 20px 16px 32px; box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    animation: fadeIn 0.2s ease;
  }
}

/* ── Auth overlay ── */
#auth-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.25s ease;
}
#auth-box {
  background: #fff; border-radius: 16px;
  padding: 36px 32px; max-width: 360px; width: 92%;
  box-shadow: 0 24px 48px rgba(0,0,0,0.22);
}
#auth-box h2 { margin: 0 0 4px; font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; }
#auth-box p { margin: 0 0 22px; font-size: 12px; color: #64748b; }
#auth-input {
  width: 100%; padding: 9px 11px; border-radius: 7px;
  border: 1.5px solid #e2e8f0; font-size: 14px;
  font-family: inherit; box-sizing: border-box;
  margin-bottom: 12px; outline: none;
  transition: border-color 0.15s;
}
#auth-input:focus { border-color: #4f46e5; }
#auth-btn {
  width: 100%; padding: 10px; border-radius: 7px; border: none;
  background: #4f46e5; color: #fff; font-weight: 700;
  font-size: 14px; cursor: pointer; font-family: inherit;
  transition: opacity 0.15s;
}
#auth-btn:hover { opacity: 0.88; }
#auth-btn:disabled { opacity: 0.5; cursor: default; }
#auth-err { color: #dc2626; font-size: 11px; margin: 8px 0 0; display: none; }
</style>
</head>
<body>
<div id="root"></div>

<!-- ── Auth (plain JS, runs before React) ── -->
<script>
window.AUTH_TOKEN = sessionStorage.getItem("cofit-auth") || "";

window.showPasswordPrompt = function(onSuccess) {
  if (document.getElementById("auth-overlay")) return;
  const overlay = document.createElement("div");
  overlay.id = "auth-overlay";
  overlay.innerHTML = `
    <div id="auth-box">
      <h2>COFIT</h2>
      <p>Digite a senha de acesso para continuar.</p>
      <input id="auth-input" type="password" placeholder="Senha..." autocomplete="current-password" />
      <button id="auth-btn">Entrar</button>
      <p id="auth-err">Senha incorreta. Tente novamente.</p>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = document.getElementById("auth-input");
  const btn = document.getElementById("auth-btn");
  const err = document.getElementById("auth-err");

  async function tryLogin() {
    const val = input.value.trim();
    if (!val) return;
    btn.disabled = true;
    btn.textContent = "Verificando...";
    err.style.display = "none";
    try {
      const r = await fetch("/api/tasks", { headers: { "x-auth-token": val } });
      if (r.status === 401) {
        err.style.display = "block";
        input.value = "";
        btn.disabled = false;
        btn.textContent = "Entrar";
        input.focus();
      } else {
        window.AUTH_TOKEN = val;
        sessionStorage.setItem("cofit-auth", val);
        overlay.remove();
        if (typeof onSuccess === "function") onSuccess();
      }
    } catch {
      err.textContent = "Erro de conexão. Tente novamente.";
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  }

  btn.addEventListener("click", tryLogin);
  input.addEventListener("keydown", e => e.key === "Enter" && tryLogin());
  setTimeout(() => input.focus(), 80);
};

window.mountApp = function() {};

if (!window.AUTH_TOKEN) {
  document.addEventListener("DOMContentLoaded", function() {
    window.showPasswordPrompt(function() { window.mountApp(); });
  });
}
</script>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef } = React;

/* ── Constants ── */
const COLUMNS = ["Inbox", "A fazer", "Em andamento", "Concluído", "Aguardando", "Snooze", "Algum dia"];
const COLLAPSIBLE_COLS = ["Concluído", "Aguardando", "Snooze", "Algum dia"]; // recolhidas por padrão (Fase 3.1c)
const COL_BG = {
  Inbox:          "rgba(100,116,139,0.07)",
  "A fazer":      "rgba(59,130,246,0.07)",
  "Em andamento": "rgba(245,158,11,0.07)",
  Concluído:      "rgba(16,185,129,0.07)",
  Aguardando:     "rgba(139,92,246,0.07)",
  Snooze:         "rgba(148,163,184,0.07)",
  "Algum dia":    "rgba(236,72,153,0.07)",
};
const COL_ACCENT = {
  Inbox:          "#64748b",
  "A fazer":      "#3b82f6",
  "Em andamento": "#f59e0b",
  Concluído:      "#10b981",
  Aguardando:     "#8b5cf6",
  Snooze:         "#94a3b8",
  "Algum dia":    "#ec4899",
};
const TAG_COLORS = {
  ITCD: { bg: "#dbeddb", text: "#1a7a2e", border: "#b8dbb8" },
  IPVA: { bg: "#d3e5ef", text: "#24548d", border: "#a8cee0" },
  "Gestão de equipe": { bg: "#e8deee", text: "#6b3fa0", border: "#d4bfe0" },
  Administrativo: { bg: "#fadec9", text: "#9a6700", border: "#f0c9a0" },
  Institucional: { bg: "#ffe2dd", text: "#c4554d", border: "#f5c4bf" },
  "Sistemas/TI": { bg: "#fdecc8", text: "#9b6a12", border: "#f0d8a0" },
  Outro: { bg: "#e3e2e0", text: "#55534e", border: "#d0cfcc" },
};
const DEFAULT_TAG_COLOR = { bg: "#e8e8ff", text: "#5b5fc7", border: "#c8c8f0" };
const getTagColor = (tag) => TAG_COLORS[tag] || DEFAULT_TAG_COLOR;

/* ── Helpers ── */
const fmtDate = (iso) => { if (!iso) return "—"; try { return new Date(iso).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" }); } catch { return iso; } };
const fmtDateShort = (iso) => { if (!iso) return "—"; try { return new Date(iso).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" }); } catch { return iso; } };
const isOverdue = (dl, col) => dl && col !== "Concluído" && new Date(dl) < new Date();
const calcDuration = (s, e) => { if (!s || !e) return null; const ms = new Date(e) - new Date(s); if (ms < 0) return null; const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000); return h > 24 ? `${Math.floor(h / 24)}d ${h % 24}h` : `${h}h ${m}min`; };

/* ── API ── */
async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { "Content-Type": "application/json", "x-auth-token": window.AUTH_TOKEN || "", ...opts.headers },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (r.status === 401) {
    sessionStorage.removeItem("cofit-auth");
    window.AUTH_TOKEN = "";
    window.showPasswordPrompt(() => window.location.reload());
    throw new Error("Sessão expirada. Faça login novamente.");
  }
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

/* ── Styles ── */
const inp = { width: "100%", padding: "7px 9px", borderRadius: 6, border: "1.5px solid #e2e8f0", fontSize: 12.5, fontFamily: "inherit", outline: "none", boxSizing: "border-box", background: "#fff", color: "#1e293b" };
const lbl = { display: "block", fontSize: 11.5, fontWeight: 600, color: "#475569", marginBottom: 4, marginTop: 12 };
const btnP = { padding: "7px 16px", borderRadius: 6, border: "none", background: "#4f46e5", color: "#fff", fontWeight: 600, fontSize: 12.5, cursor: "pointer", fontFamily: "inherit" };
const btnG = { padding: "7px 12px", borderRadius: 6, border: "1.5px solid #e2e8f0", background: "transparent", color: "#64748b", fontWeight: 500, fontSize: 12.5, cursor: "pointer", fontFamily: "inherit" };
const btnS = { padding: "3px 8px", borderRadius: 4, border: "1px solid #e2e8f0", background: "#fff", color: "#475569", fontSize: 10.5, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 };
/* FIX: removido overflow:"hidden" — era a causa do texto truncado nos cards expandidos */
const cardBase = (accent) => ({ background: "#fff", borderRadius: 7, boxShadow: "0 1px 2px rgba(0,0,0,0.04)", borderLeft: `3px solid ${accent}` });

/* ── Components ── */

/* CHANGED: TagChip aceita onRemove para modo edição */
function TagChip({ tag, small, onRemove }) {
  const c = getTagColor(tag);
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 2, padding: small ? "1px 5px" : "2px 7px", borderRadius: 4, fontSize: small ? 9.5 : 11, fontWeight: 600, background: c.bg, color: c.text, border: `1px solid ${c.border}`, lineHeight: 1.5, whiteSpace: "nowrap" }}>
      {tag}
      {onRemove && <span onClick={e => { e.stopPropagation(); onRemove(tag); }} style={{ cursor: "pointer", marginLeft: 1, fontSize: small ? 10 : 12, opacity: 0.6, lineHeight: 1 }} title="Remover tag">×</span>}
    </span>
  );
}

/* NEW: editor de tags com autocomplete das existentes + criação de novas */
function TagEditor({ tags, allTags, onChange }) {
  const [input, setInput] = useState("");
  const [showSug, setShowSug] = useState(false);

  const suggestions = allTags.filter(t => !tags.includes(t) && t.toLowerCase().includes(input.toLowerCase()));

  function addTag(t) {
    const v = t.trim();
    if (v && !tags.includes(v)) onChange([...tags, v]);
    setInput("");
    setShowSug(false);
  }

  return (
    <div style={{ marginBottom: 5 }}>
      <span style={{ fontSize: 10, color: "#94a3b8", display: "block", marginBottom: 3 }}>Tags:</span>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginBottom: 4 }}>
        {tags.map(t => <TagChip key={t} tag={t} small onRemove={tag => onChange(tags.filter(x => x !== tag))} />)}
      </div>
      <div style={{ position: "relative" }}>
        <input
          value={input}
          onChange={e => { setInput(e.target.value); setShowSug(true); }}
          onFocus={() => setShowSug(true)}
          onBlur={() => setTimeout(() => setShowSug(false), 150)}
          onKeyDown={e => {
            if (e.key === "Enter" && input.trim()) { e.preventDefault(); addTag(input); }
            if (e.key === "Backspace" && !input && tags.length) onChange(tags.slice(0, -1));
          }}
          placeholder="Adicionar tag..."
          style={{ ...inp, fontSize: 11, padding: "4px 7px" }}
        />
        {showSug && (suggestions.length > 0 || (input.trim() && !tags.includes(input.trim()))) && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 6, boxShadow: "0 4px 12px rgba(0,0,0,0.1)", zIndex: 10, maxHeight: 130, overflowY: "auto", marginTop: 2 }}>
            {suggestions.map(s => (
              <div key={s} onMouseDown={() => addTag(s)} style={{ padding: "5px 8px", fontSize: 11, cursor: "pointer" }}
                onMouseEnter={e => e.currentTarget.style.background = "#f1f5f9"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <TagChip tag={s} small />
              </div>
            ))}
            {input.trim() && !allTags.includes(input.trim()) && !tags.includes(input.trim()) && (
              <div onMouseDown={() => addTag(input)} style={{ padding: "5px 8px", fontSize: 11, cursor: "pointer", color: "#4f46e5", fontWeight: 500 }}
                onMouseEnter={e => e.currentTarget.style.background = "#f1f5f9"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                + Criar "{input.trim()}"
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function Banner({ status, onDismiss }) {
  if (!status) return null;
  const isErr = status.type === "error";
  const bg = isErr ? "#fef2f2" : status.type === "success" ? "#f0fdf4" : "#eff6ff";
  const border = isErr ? "#fca5a5" : status.type === "success" ? "#86efac" : "#93c5fd";
  const color = isErr ? "#991b1b" : status.type === "success" ? "#166534" : "#1e40af";
  const icon = status.type === "syncing" ? "🔄" : isErr ? "⚠️" : "✅";
  return (
    <div style={{ background: bg, border: `1px solid ${border}`, borderRadius: 8, padding: "8px 14px", margin: "0 0 10px", animation: "fadeIn 0.2s ease", fontSize: 12, color }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ display: "inline-block", animation: status.type === "syncing" ? "spin 1s linear infinite" : "none", flexShrink: 0 }}>{icon}</span>
        <span style={{ flex: 1, lineHeight: 1.4, fontWeight: 600 }}>{status.msg}</span>
        {status.type !== "syncing" && <button onClick={onDismiss} style={{ border: "none", background: "transparent", color: "#94a3b8", cursor: "pointer", fontSize: 14, padding: "0 2px", lineHeight: 1 }}>✕</button>}
      </div>
      {status.detail && <div style={{ fontSize: 10.5, color: isErr ? "#7f1d1d" : "#64748b", marginTop: 4, lineHeight: 1.5, wordBreak: "break-all", maxHeight: 80, overflowY: "auto", background: isErr ? "rgba(0,0,0,0.03)" : "transparent", borderRadius: 4, padding: isErr ? "4px 6px" : 0, fontFamily: isErr ? "monospace" : "inherit" }}>{status.detail}</div>}
    </div>
  );
}

function ProfileModal({ onSave, initial, onClose }) {
  const [role, setRole] = useState(initial?.role || "");
  const [areas, setAreas] = useState(initial?.areas || "");
  const [crit, setCrit] = useState(initial?.criterion || "");
  const ok = role && areas && crit;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(6px)" }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: "28px 24px", maxWidth: 420, width: "92%", boxShadow: "0 20px 40px rgba(0,0,0,0.18)" }}>
        <h2 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 700, color: "#0f172a" }}>Perfil</h2>
        <p style={{ margin: "0 0 18px", fontSize: 12, color: "#64748b" }}>Usado pela IA para priorizar melhor.</p>
        <label style={lbl}>Cargo</label>
        <select value={role} onChange={e => setRole(e.target.value)} style={inp}><option value="">Selecione...</option>{["Coordenador","Gestor","Auditor","Analista","Executor","Assessor"].map(o => <option key={o}>{o}</option>)}</select>
        <label style={lbl}>Áreas</label>
        <textarea value={areas} onChange={e => setAreas(e.target.value)} placeholder="Ex: ITCD, IPVA, gestão de equipe..." rows={2} style={{ ...inp, resize: "vertical" }} />
        <label style={lbl}>Critério dominante</label>
        <select value={crit} onChange={e => setCrit(e.target.value)} style={inp}><option value="">Selecione...</option>{["Prazo legal / regulatório","Impacto institucional / político","Volume operacional","Desenvolvimento de equipe","Entrega de projetos"].map(o => <option key={o}>{o}</option>)}</select>
        <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
          {initial && <button onClick={onClose} style={{ ...btnG, flex: 1 }}>Cancelar</button>}
          <button onClick={() => ok && onSave({ role, areas, criterion: crit })} disabled={!ok} style={{ ...btnP, flex: 1, opacity: ok ? 1 : 0.4 }}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

function AddForm({ onAdd, busy, initialOpen = false }) {
  const [title, setTitle] = useState(""); const [desc, setDesc] = useState(""); const [dl, setDl] = useState(""); const [open, setOpen] = useState(initialOpen);
  const submit = () => { if (!title.trim() || busy) return; onAdd({ title: title.trim(), description: desc.trim(), deadline: dl || null }); setTitle(""); setDesc(""); setDl(""); setOpen(false); };
  if (!open) return <button onClick={() => setOpen(true)} style={{ ...btnP, fontSize: 12, padding: "7px 14px" }}>+ Nova tarefa</button>;
  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: 14, boxShadow: "0 2px 10px rgba(0,0,0,0.07)", marginBottom: 10 }}>
      <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Título..." onKeyDown={e => e.key === "Enter" && submit()} style={{ ...inp, fontWeight: 600, marginBottom: 5 }} autoFocus />
      <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="Descrição..." rows={2} style={{ ...inp, resize: "vertical", marginBottom: 5 }} />
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 11, color: "#64748b" }}>Prazo:</span>
        <input type="date" value={dl} onChange={e => setDl(e.target.value)} style={{ ...inp, width: "auto", padding: "4px 7px", fontSize: 11 }} />
        <div style={{ flex: 1 }} />
        <button onClick={() => setOpen(false)} style={btnG}>Cancelar</button>
        <button onClick={submit} disabled={!title.trim() || busy} style={{ ...btnP, opacity: !title.trim() || busy ? 0.5 : 1 }}>{busy ? "..." : "Adicionar"}</button>
      </div>
    </div>
  );
}

/* CHANGED: TaskCard recebe allTags, gerencia eTags, inclui TagEditor no modo edição */
function TaskCard({ task, colIndex, onMove, onEdit, onDelete, onImprove, onReorder, processing, allTags, isNew, reordering }) {
  const [open, setOpen] = useState(false);
  const [editing, setEditing] = useState(false);
  const [eT, setET] = useState(task.title);
  const [eD, setED] = useState(task.description);
  const [eDl, setEDl] = useState(task.deadline || "");
  const [eTags, setETags] = useState(task.tags || []);
  const isProc = processing === task.id;
  const overdue = isOverdue(task.deadline, task.column);
  const isDone = task.column === "Concluído";

  useEffect(() => { setET(task.title); setED(task.description); setEDl(task.deadline || ""); setETags(task.tags || []); }, [task.title, task.description, task.deadline, JSON.stringify(task.tags)]);

  /* CHANGED: save passa tags editadas pelo usuário */
  const save = () => { if (!eT.trim()) return; onEdit(task.id, { title: eT.trim(), description: eD.trim(), deadline: eDl || null, tags: eTags }); setEditing(false); };

  const priBadge = task.ordem != null ? (
    <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", minWidth: 20, height: 20, borderRadius: "50%", fontSize: 10, fontWeight: 700,
      background: "#f1f5f9", color: "#64748b", border: "1.5px solid #cbd5e1", flexShrink: 0 }}>{task.ordem}</span>
  ) : null;

  if (editing) return (
    <div style={{ ...cardBase(COL_ACCENT[task.column]), padding: 12 }}>
      <input value={eT} onChange={e => setET(e.target.value)} style={{ ...inp, fontWeight: 600, fontSize: 12, marginBottom: 5 }} autoFocus />
      <textarea value={eD} onChange={e => setED(e.target.value)} rows={3} style={{ ...inp, fontSize: 11, resize: "vertical", marginBottom: 5 }} />
      {/* NEW: editor de tags inline */}
      <TagEditor tags={eTags} allTags={allTags} onChange={setETags} />
      <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 7 }}><span style={{ fontSize: 10, color: "#94a3b8" }}>Prazo:</span><input type="date" value={eDl} onChange={e => setEDl(e.target.value)} style={{ ...inp, width: "auto", padding: "3px 5px", fontSize: 10 }} /></div>
      <div style={{ display: "flex", gap: 5, justifyContent: "flex-end" }}>
        <button onClick={() => { setET(task.title); setED(task.description); setEDl(task.deadline || ""); setETags(task.tags || []); setEditing(false); }} style={{ ...btnS, background: "#f1f5f9" }}>Cancelar</button>
        <button onClick={save} style={{ ...btnS, background: "#4f46e5", color: "#fff" }}>Salvar</button>
      </div>
    </div>
  );

  /* Borda e fundo especiais quando o card é recém-criado */
  const newStyle = isNew ? {
    borderLeft: "3px solid #4f46e5",
    boxShadow: "0 0 0 2px #4f46e520, 0 2px 8px rgba(79,70,229,0.12)",
    background: "#fafafe",
  } : {};

  return (
    <div className="card-wrap" style={{ ...cardBase(COL_ACCENT[task.column]), ...newStyle, opacity: isProc ? 0.5 : isDone ? 0.72 : 1, position: "relative", borderLeftColor: isNew ? "#4f46e5" : overdue ? "#ef4444" : COL_ACCENT[task.column], transition: "all 0.2s" }}>

          <span style={{ fontSize: 9.5, fontWeight: 700, color: "#4f46e5", background: "#ede9fe", borderRadius: 3, padding: "1px 5px", letterSpacing: 0.3 }}>NOVA</span>

            <button onClick={e => { e.stopPropagation(); setEditing(true); }} style={{ ...btnS, color: "#3b82f6" }}>✏️</button>

          </div>
        </div>
      )}

      {/* Inbox (colIndex=0): botões de destino + reordenação sempre visíveis no card fechado */}
      {!open && !isNew && colIndex === 0 && (
        <div style={{ display: "flex", gap: 4, padding: "0 10px 8px", alignItems: "center" }}>
          <button onClick={e => { e.stopPropagation(); onMove(task.id, "A fazer"); }} style={{ ...btnS, background: "#eff6ff", color: "#3b82f6", border: "1px solid #bfdbfe", fontWeight: 600 }}>A fazer</button>
          <button onClick={e => { e.stopPropagation(); onMove(task.id, "Em andamento"); }} style={{ ...btnS, background: "#fffbeb", color: "#d97706", border: "1px solid #fde68a", fontWeight: 600 }}>Em andamento</button>
          <div style={{ flex: 1 }} />
          {onReorder && <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "up"); }} disabled={reordering} style={{ ...btnS, padding: "2px 7px", opacity: reordering ? 0.4 : 1, cursor: reordering ? "not-allowed" : "pointer" }} title="Mover para cima">{reordering ? "⏳" : "↑"}</button>}
          {onReorder && <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "down"); }} disabled={reordering} style={{ ...btnS, padding: "2px 7px", opacity: reordering ? 0.4 : 1, cursor: reordering ? "not-allowed" : "pointer" }} title="Mover para baixo">{reordering ? "⏳" : "↓"}</button>}
        </div>
      )}

      {/* Outras colunas: setas de coluna + reordenação aparecem só no hover */}
      {!open && !isNew && colIndex > 0 && (
        <div className="hover-actions" style={{ position: "absolute", right: 6, top: 7, display: "none", gap: 2 }}>
          <button onClick={e => { e.stopPropagation(); onMove(task.id, COLUMNS[colIndex - 1]); }} style={{ ...btnS, padding: "2px 5px", fontSize: 9 }}>←</button>
          {colIndex < COLUMNS.length - 1 && <button onClick={e => { e.stopPropagation(); onMove(task.id, COLUMNS[colIndex + 1]); }} style={{ ...btnS, padding: "2px 5px", fontSize: 9 }}>→</button>}
          {onReorder && <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "up"); }} disabled={reordering} style={{ ...btnS, padding: "2px 5px", fontSize: 9, opacity: reordering ? 0.4 : 1, cursor: reordering ? "not-allowed" : "pointer" }} title="Mover para cima">{reordering ? "⏳" : "↑"}</button>}
          {onReorder && <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "down"); }} disabled={reordering} style={{ ...btnS, padding: "2px 5px", fontSize: 9, opacity: reordering ? 0.4 : 1, cursor: reordering ? "not-allowed" : "pointer" }} title="Mover para baixo">{reordering ? "⏳" : "↓"}</button>}
        </div>
      )}
    </div>
  );
}

/* CHANGED: Column recebe e repassa allTags e newCardId */
function Column({ name, tasks, colIndex, onMove, onEdit, onDelete, onImprove, onReorder, processing, allTags, onCollapse, newCardId, reordering }) {
  const [showAll, setShowAll] = useState(false);
  const isDone = name === "Concluído";

  /* Card novo sempre no topo; demais ordenados por prioridade */
  const sorted = [...tasks].sort((a, b) => {
    if (a.id === newCardId) return -1;
    if (b.id === newCardId) return 1;
    return (a.ordem ?? Infinity) - (b.ordem ?? Infinity);
  });
  const visible = isDone && !showAll ? sorted.slice(0, 5) : sorted;
  const hidden = isDone ? sorted.length - visible.length : 0;
  return (
    <div style={{ flex: 1, minWidth: 230, display: "flex", flexDirection: "column", maxHeight: "calc(100vh - 150px)", background: COL_BG[name], borderRadius: 10, padding: "0 0 6px", overflow: "hidden" }}>
      <div
        onClick={onCollapse || undefined}
        title={onCollapse ? "Clique para recolher" : undefined}
        style={{ display: "flex", alignItems: "center", gap: 7, padding: "12px 12px 9px", borderBottom: `2px solid ${COL_ACCENT[name]}20`, flexShrink: 0, cursor: onCollapse ? "pointer" : "default" }}
      >
        <div style={{ width: 9, height: 9, borderRadius: 3, background: COL_ACCENT[name] }} />
        <span style={{ fontSize: 12.5, fontWeight: 700, color: "#0f172a" }}>{name}</span>
        <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600 }}>{tasks.length}</span>
        {onCollapse && (
          <span style={{ marginLeft: "auto", color: "#cbd5e1", fontSize: 11, lineHeight: 1, userSelect: "none" }}>⟨</span>
        )}
      </div>
      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "7px 6px 3px", display: "flex", flexDirection: "column", gap: 5 }}>
        {visible.map(t => <TaskCard key={t.id} task={t} colIndex={colIndex} onMove={onMove} onEdit={onEdit} onDelete={onDelete} onImprove={onImprove} onReorder={onReorder} processing={processing} allTags={allTags} isNew={t.id === newCardId} reordering={reordering} />)}
        {!tasks.length && <p style={{ fontSize: 11, color: "#cbd5e1", textAlign: "center", padding: 20 }}>Nenhuma tarefa</p>}
        {hidden > 0 && <button onClick={() => setShowAll(true)} style={{ ...btnG, fontSize: 10, padding: "5px 0", textAlign: "center", width: "100%", border: "1px dashed #cbd5e1" }}>+ {hidden} anterior{hidden > 1 ? "es" : ""}</button>}
        {isDone && showAll && sorted.length > 5 && <button onClick={() => setShowAll(false)} style={{ ...btnG, fontSize: 10, padding: "5px 0", textAlign: "center", width: "100%", border: "1px dashed #cbd5e1" }}>Mostrar menos</button>}
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [tasks, setTasks] = useState([]);
  const [profile, setProfile] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cofit-profile")); } catch { return null; }
  });
  const [collapsedCols, setCollapsedCols] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("cofit-collapsed"));
      if (!saved) return COLLAPSIBLE_COLS;
      // Migração 3.1c: garante que as novas colunas recolhíveis estejam no array salvo
      const merged = [...new Set([...saved, ...COLLAPSIBLE_COLS.filter(c => !["Concluído"].includes(c))])];
      return merged;
    } catch { return COLLAPSIBLE_COLS; }
  });
  const [showProfile, setShowProfile] = useState(false);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [processing, setProcessing] = useState(null);
  const [prioritizing, setPrioritizing] = useState(false);
  const [banner, setBanner] = useState(null);
  const [newCardId, setNewCardId] = useState(null);
  const [mobileCol, setMobileCol] = useState(0); // índice da coluna visível no mobile
  const [showMobileAdd, setShowMobileAdd] = useState(false);
  const [reorderingCol, setReorderingCol] = useState(new Set()); // colunas com operação de reordenação em voo
  const allTags = [...new Set(tasks.flatMap(t => t.tags || []))];

  function toggleCol(name) {
    setCollapsedCols(prev => {
      const next = prev.includes(name) ? prev.filter(c => c !== name) : [...prev, name];
      localStorage.setItem("cofit-collapsed", JSON.stringify(next));
      return next;
    });
  }

  useEffect(() => { fetchTasks(); }, []);
  useEffect(() => { if (!loading && !profile) setShowProfile(true); }, [loading, profile]);

  // Renumera sequencialmente (1..N) as tasks de uma coluna.
  // Retorna { updatedTasks, changed } onde `changed` contém só as tasks cujo valor de ordem mudou.
  function renumberColumn(allTasks, colName, currentNewCardId) {
    const colTasks = allTasks.filter(t => t.column === colName);
    const sorted = [...colTasks].sort((a, b) => {
      if (a.id === currentNewCardId) return -1;
      if (b.id === currentNewCardId) return 1;
      const oa = a.ordem ?? Infinity;
      const ob = b.ordem ?? Infinity;
      if (oa !== ob) return oa - ob;
      return (a.createdAt || "").localeCompare(b.createdAt || ""); // desempate estável
    });
    const changed = [];
    const newOrderById = new Map();
    sorted.forEach((t, i) => {
      const newOrdem = i + 1;
      if (t.ordem !== newOrdem) changed.push({ id: t.id, ordem: newOrdem });
      newOrderById.set(t.id, newOrdem);
    });
    const updatedTasks = allTasks.map(t =>
      newOrderById.has(t.id) ? { ...t, ordem: newOrderById.get(t.id) } : t
    );
    return { updatedTasks, changed };
  }

  async function fetchTasks() {
    setLoading(true); setLoadError(null);
    try {
      const data = await api("/api/tasks");
      setTasks(data.tasks || []);
    } catch (e) {
      if (!e.message.includes("expirada")) setLoadError(e.message);
    }
    setLoading(false);
  }

  function updateLocal(id, changes) {
    setTasks(prev => prev.map(t => t.id === id ? { ...t, ...changes } : t));
  }

  async function handleAdd({ title, description, deadline }) {
    setProcessing("new");
    try {
      let polished = null;
      try { polished = await api("/api/ai-polish", { method: "POST", body: { title, description, existingTags: allTags, profile } }); } catch {}
      const taskData = { title: polished?.title || title, description: polished?.description || description, tags: polished?.tags || [], deadline, column: "Inbox", createdAt: new Date().toISOString() };
      const data = await api("/api/tasks", { method: "POST", body: taskData });
      setTasks(prev => [...prev, data.task]);
      setNewCardId(data.task.id);
    } catch (e) { setBanner({ type: "error", msg: "Erro ao criar tarefa", detail: e.message }); }
    setProcessing(null);
  }

  async function handleMove(id, target) {
    const task = tasks.find(t => t.id === id); if (!task) return;
    if (task.column === target) return;
    if (id === newCardId) setNewCardId(null); // remove destaque ao mover

    const sourceCol = task.column;
    const changes = { column: target };
    if (target === "Em andamento" && !task.startedAt) changes.startedAt = new Date().toISOString();
    if (target === "Concluído") { changes.completedAt = new Date().toISOString(); changes.duration = calcDuration(task.startedAt || task.createdAt, changes.completedAt); }
    if (sourceCol === "Concluído" && target !== "Concluído") { changes.completedAt = null; changes.duration = null; }

    // Task entra no fim da coluna destino
    const destSize = tasks.filter(t => t.column === target).length;
    changes.ordem = destSize + 1;

    // Snapshot para rollback
    const snapshot = tasks.map(t => ({ id: t.id, column: t.column, ordem: t.ordem,
      startedAt: t.startedAt, completedAt: t.completedAt, duration: t.duration }));

    // Aplica movimentação local
    let next = tasks.map(t => t.id === id ? { ...t, ...changes } : t);

    // Renumera coluna origem para fechar o gap
    const { updatedTasks: nextAfterRenum, changed: sourceChanged } =
      renumberColumn(next, sourceCol, newCardId);
    next = nextAfterRenum;

    setTasks(next);

    // Persiste: move principal + renumerações da origem
    const patches = [
      api(`/api/tasks/${id}`, { method: "PATCH", body: changes }),
      ...sourceChanged.map(c =>
        api(`/api/tasks/${c.id}`, { method: "PATCH", body: { ordem: c.ordem } })
      ),
    ];

    try {
      await Promise.all(patches);
    } catch (e) {
      setTasks(prev => prev.map(t => {
        const snap = snapshot.find(s => s.id === t.id);
        return snap ? { ...t, ...snap } : t;
      }));
      setBanner({ type: "error", msg: "Erro ao mover tarefa", detail: e.message });
    }
  }

  /* CHANGED: handleEdit agora recebe tags do formulário e as usa diretamente */
  async function handleEdit(id, { title, description, deadline, tags }) {
    setProcessing(id); const task = tasks.find(t => t.id === id); if (!task) { setProcessing(null); return; }
    try {
      let polished = null;
      try { polished = await api("/api/ai-polish", { method: "POST", body: { title, description, existingTags: allTags, profile } }); } catch {}
      const changes = {
        title: polished?.title || title,
        description: polished?.description || description,
        tags: tags,  /* CHANGED: usa tags do usuário, não da IA */
        deadline,
        priority: null,
        reason: ""
      };
      await api(`/api/tasks/${id}`, { method: "PATCH", body: changes }); updateLocal(id, changes);
    } catch (e) { setBanner({ type: "error", msg: "Erro ao editar tarefa", detail: e.message }); }
    setProcessing(null);
  }

  async function handleImprove(id) {
    setProcessing(id); const task = tasks.find(t => t.id === id); if (!task) { setProcessing(null); return; }
    try {
      const polished = await api("/api/ai-polish", { method: "POST", body: { title: task.title, description: task.description, existingTags: allTags, profile } });
      const changes = { title: polished.title || task.title, description: polished.description || task.description, tags: polished.tags || task.tags };
      await api(`/api/tasks/${id}`, { method: "PATCH", body: changes }); updateLocal(id, changes);
    } catch (e) { setBanner({ type: "error", msg: "Erro ao melhorar tarefa", detail: e.message }); }
    setProcessing(null);
  }

  async function handleReorder(id, direction) {
    const task = tasks.find(t => t.id === id); if (!task) return;
    if (reorderingCol.has(task.column)) return; // bloqueia cliques concorrentes

    // Ordena a coluna pela visão atual (mesma lógica do Column e do renumberColumn)
    const colTasks = [...tasks.filter(t => t.column === task.column)].sort((a, b) => {
      if (a.id === newCardId) return -1;
      if (b.id === newCardId) return 1;
      const oa = a.ordem ?? Infinity;
      const ob = b.ordem ?? Infinity;
      if (oa !== ob) return oa - ob;
      return (a.createdAt || "").localeCompare(b.createdAt || ""); // desempate estável
    });

    const idx = colTasks.findIndex(t => t.id === id);
    const targetIdx = direction === "up" ? idx - 1 : idx + 1;
    if (targetIdx < 0 || targetIdx >= colTasks.length) return;

    // Manipulação de array: remove e insere no novo índice
    const reordered = [...colTasks];
    const [moved] = reordered.splice(idx, 1);
    reordered.splice(targetIdx, 0, moved);

    // Aplica nova ordem (1..N) — persiste toda a coluna para garantir consistência com o Notion
    const newOrderById = new Map();
    const allWithNewOrdem = [];
    reordered.forEach((t, i) => {
      const newOrdem = i + 1;
      newOrderById.set(t.id, newOrdem);
      allWithNewOrdem.push({ id: t.id, ordem: newOrdem });
    });

    // Snapshot para rollback local
    const prevOrderById = new Map(colTasks.map(t => [t.id, t.ordem]));

    // Atualiza estado local imediatamente
    setTasks(prev => prev.map(t =>
      newOrderById.has(t.id) ? { ...t, ordem: newOrderById.get(t.id) } : t
    ));

    // Marca coluna como em operação (bloqueia ↑/↓ e exibe ⏳)
    setReorderingCol(prev => { const s = new Set(prev); s.add(task.column); return s; });

    try {
      await Promise.all(
        allWithNewOrdem.map(c => api(`/api/tasks/${c.id}`, { method: "PATCH", body: { ordem: c.ordem } }))
      );
    } catch (e) {
      // Rollback local. Se algum PATCH teve sucesso e outro falhou, o próximo fetchTasks reconcilia.
      setTasks(prev => prev.map(t =>
        prevOrderById.has(t.id) ? { ...t, ordem: prevOrderById.get(t.id) } : t
      ));
      setBanner({ type: "error", msg: "Erro ao reordenar", detail: e.message });
    } finally {
      setReorderingCol(prev => { const s = new Set(prev); s.delete(task.column); return s; });
    }
  }

  async function handleDelete(id) {
    const task = tasks.find(t => t.id === id); if (!task) return;
    setTasks(prev => prev.filter(t => t.id !== id));
    try { await api(`/api/tasks/${id}`, { method: "DELETE" }); }
    catch (e) { setTasks(prev => [...prev, task]); setBanner({ type: "error", msg: "Erro ao arquivar tarefa", detail: e.message }); }
  }

  async function handlePrioritize() {
    setPrioritizing(true);
    try {
      const active = tasks.filter(t => t.column !== "Concluído");
      if (!active.length) { setPrioritizing(false); return; }
      const data = await api("/api/ai-prioritize", { method: "POST", body: { tasks: active, profile } });
      const priorities = data.priorities || [];
      if (priorities.length) {
        const updated = tasks.map(t => { const p = priorities.find(r => r.id === t.id); return p ? { ...t, priority: p.priority, reason: p.reason } : t; });
        setTasks(updated);
        for (const p of priorities) { api(`/api/tasks/${p.id}`, { method: "PATCH", body: { priority: p.priority, reason: p.reason } }).catch(() => {}); }
        setBanner({ type: "success", msg: `${priorities.length} tarefa(s) priorizadas` });
      }
    } catch (e) { setBanner({ type: "error", msg: "Erro ao priorizar", detail: e.message }); }
    setPrioritizing(false);
  }

  function saveProfile(p) { setProfile(p); localStorage.setItem("cofit-profile", JSON.stringify(p)); setShowProfile(false); }

  if (loading) return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: "#64748b" }}>Carregando tarefas do Notion...</div>;

  if (loadError) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", color: "#64748b", gap: 12, padding: 20, textAlign: "center" }}>
      <span style={{ fontSize: 32 }}>⚠️</span>
      <p style={{ fontSize: 14, fontWeight: 600, color: "#991b1b" }}>Erro ao carregar tarefas</p>
      <p style={{ fontSize: 12, color: "#64748b", maxWidth: 400, fontFamily: "monospace" }}>{loadError}</p>
      <button onClick={fetchTasks} style={btnP}>Tentar novamente</button>
    </div>
  );

  const byCols = COLUMNS.map(c => tasks.filter(t => t.column === c));
  const COL_IDX = Object.fromEntries(COLUMNS.map((c, i) => [c, i])); // { Inbox:0, "A fazer":1, … }
  const activeN = tasks.filter(t => t.column !== "Concluído").length;
  const doingN = byCols[COL_IDX["Em andamento"]].length;
  const doneToday = byCols[COL_IDX["Concluído"]].filter(t => t.completedAt && new Date(t.completedAt).toDateString() === new Date().toDateString()).length;

  /* Colunas disponíveis no mobile: todas (incluindo as "recolhidas" no desktop, que no mobile entram no dropdown) */
  const mobileColName = COLUMNS[mobileCol] || COLUMNS[0];

  return (
    <div>
      {showProfile && <ProfileModal onSave={saveProfile} initial={profile} onClose={profile ? () => setShowProfile(false) : undefined} />}

      {/* ── Header desktop ── */}
      <header className="desktop-only" style={{ background: "#0f172a", color: "#fff", padding: "10px 18px", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
        <span style={{ fontSize: 18, fontWeight: 800, letterSpacing: "-0.5px" }}>COFIT</span>
        <span style={{ fontSize: 11, color: "#475569" }}>Task Manager</span>
        <div style={{ display: "flex", gap: 10, fontSize: 11, color: "#94a3b8", marginLeft: 6 }}>
          <span><b style={{ color: "#60a5fa" }}>{activeN}</b> ativa{activeN !== 1 ? "s" : ""}</span>
          <span><b style={{ color: "#fbbf24" }}>{doingN}</b> em andamento</span>
          <span><b style={{ color: "#34d399" }}>{doneToday}</b> concluída{doneToday !== 1 ? "s" : ""} hoje</span>
        </div>
        <div style={{ flex: 1 }} />
        {collapsedCols.filter(c => COLLAPSIBLE_COLS.includes(c)).map(c => {
          const idx = COLUMNS.indexOf(c);
          const count = idx >= 0 ? byCols[idx].length : 0;
          return <CollapsiblePill key={c} name={c} count={count} onExpand={() => toggleCol(c)} />;
        })}
        <button onClick={fetchTasks} title="Recarregar do Notion" style={{ padding: "4px 10px", borderRadius: 5, border: "1px solid rgba(255,255,255,0.15)", background: "transparent", color: "#94a3b8", fontSize: 10, fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5 }}>
          <span>🔄</span><span style={{ fontWeight: 600 }}>Recarregar</span>
        </button>
        <button onClick={() => setShowProfile(true)} style={{ padding: "4px 8px", borderRadius: 5, border: "1px solid rgba(255,255,255,0.12)", background: "transparent", color: "#475569", fontSize: 12 }}>⚙️</button>
      </header>

      {/* ── Header mobile ── */}
      <header className="mobile-only" style={{ background: "#0f172a", color: "#fff", padding: "10px 14px", alignItems: "center", gap: 10 }}>
        <span style={{ fontSize: 16, fontWeight: 800, letterSpacing: "-0.5px" }}>COFIT</span>
        <div style={{ flex: 1 }}>
          <select
            value={mobileCol}
            onChange={e => setMobileCol(Number(e.target.value))}
            style={{ width: "100%", background: "rgba(255,255,255,0.08)", color: "#fff", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 6, padding: "5px 8px", fontSize: 13, fontFamily: "inherit", fontWeight: 600 }}
          >
            {COLUMNS.map((col, i) => (
              <option key={col} value={i} style={{ background: "#1e293b", color: "#fff" }}>
                {col} ({byCols[i].length})
              </option>
            ))}
          </select>
        </div>
        <button onClick={fetchTasks} style={{ border: "none", background: "transparent", color: "#94a3b8", fontSize: 18, padding: "2px 4px", lineHeight: 1 }}>🔄</button>
        <button onClick={() => setShowProfile(true)} style={{ border: "none", background: "transparent", color: "#475569", fontSize: 18, padding: "2px 4px", lineHeight: 1 }}>⚙️</button>
      </header>

      {/* ── Conteúdo desktop ── */}
      <div className="desktop-only" style={{ padding: "12px 16px", flexDirection: "column" }}>
        <Banner status={banner} onDismiss={() => setBanner(null)} />
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
          <AddForm onAdd={handleAdd} busy={processing === "new"} />
          <button onClick={handlePrioritize} disabled={prioritizing || !activeN} style={{ ...btnP, background: "#1e40af", fontSize: 12, padding: "7px 14px", opacity: prioritizing || !activeN ? 0.5 : 1 }}>⚡ {prioritizing ? "..." : "Priorizar"}</button>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {COLUMNS.filter(col => !collapsedCols.includes(col)).map((col) => {
            const i = COLUMNS.indexOf(col);
            const isCollapsible = COLLAPSIBLE_COLS.includes(col);
            return <Column key={col} name={col} tasks={byCols[i]} colIndex={i} onMove={handleMove} onEdit={handleEdit} onDelete={handleDelete} onImprove={handleImprove} onReorder={handleReorder} processing={processing} allTags={allTags} onCollapse={isCollapsible ? () => toggleCol(col) : null} newCardId={newCardId} reordering={reorderingCol.has(col)} />;
          })}
        </div>
      </div>

      {/* ── Conteúdo mobile ── */}
      <div className="mobile-only" style={{ padding: "10px 10px 80px", flexDirection: "column" }}>
        <Banner status={banner} onDismiss={() => setBanner(null)} />
        <Column
          name={mobileColName}
          tasks={byCols[mobileCol]}
          colIndex={mobileCol}
          onMove={handleMove}
          onEdit={handleEdit}
          onDelete={handleDelete}
          onImprove={handleImprove}
          onReorder={handleReorder}
          processing={processing}
          allTags={allTags}
          onCollapse={null}
          newCardId={newCardId}
          reordering={reorderingCol.has(COLUMNS[mobileCol])}
        />
      </div>

      {/* ── FAB mobile ── */}
      <button className="fab" onClick={() => setShowMobileAdd(true)} aria-label="Nova tarefa">+</button>

      {/* ── Modal de criação mobile ── */}
      {showMobileAdd && (
        <>
          <div className="mobile-add-backdrop" onClick={() => setShowMobileAdd(false)} />
          <div className="mobile-add-modal">
            <p style={{ margin: "0 0 10px", fontSize: 13, fontWeight: 700, color: "#0f172a" }}>Nova tarefa</p>
            <AddForm onAdd={(data) => { handleAdd(data); setShowMobileAdd(false); }} busy={processing === "new"} initialOpen />
          </div>
        </>
      )}
    </div>
  );
}

window.mountApp = function() {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
};

if (window.AUTH_TOKEN) {
  window.mountApp();
}
</script>
</body>
</html>
