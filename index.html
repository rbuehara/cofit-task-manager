<style>
:root {
  /* Status — paleta Aurora oficial */
  --status-inbox:   #9CA3AF;
  --status-todo:    #3B82F6;
  --status-doing:   #F59E0B;
  --status-waiting: #8B5CF6;  /* Aguardando: roxo */
  --status-snooze:  #06B6D4;  /* Snooze: ciano */
  --status-done:    #22C55E;
  --status-someday: #E879A0;

  /* Surfaces (só aplicadas ao board dark) */
  --au-bg: #0c1224;
  --au-surface: #1a2240;
  --au-surface-hi: #222b4d;
  --au-surface-alt: #0f1730;
  --au-ink: #eef1f7;
  --au-ink-mid: #c2cae0;
  --au-ink-low: #8892ad;
  --au-ink-faint: #6a7391;
  --au-hair: #2a3352;
  --au-hair-soft: #1f284a;
  --au-overdue: #f59e0b;
  --au-wait-strong: #f59e0b;
}
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; font-family: 'DM Sans', sans-serif; background: #0c1224; min-height: 100vh; }
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2a3352; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3a4366; }
button { cursor: pointer; font-family: inherit; }
button:hover { filter: brightness(0.93); }
input:focus, textarea:focus, select:focus { border-color: #4f46e5 !important; outline: none; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
.card-wrap:hover .hover-actions { display: flex !important; }

/* ── Mobile layout ── */
.desktop-only { display: flex; }
.mobile-only  { display: none; }
.fab { display: none; }
@media (max-width: 639px) {
  .desktop-only { display: none !important; }
  .mobile-only  { display: flex !important; }
  .fab {
    display: flex;
    position: fixed; bottom: 22px; right: 22px; z-index: 500;
    width: 52px; height: 52px; border-radius: 50%;
    background: #4f46e5; color: #fff; border: none;
    font-size: 26px; line-height: 1; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(79,70,229,0.45);
    cursor: pointer; font-family: inherit;
  }
  .fab:hover { filter: brightness(0.9); }
  .mobile-add-backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    z-index: 490; backdrop-filter: blur(4px);
  }
  .mobile-add-modal {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
    background: #fff; border-radius: 16px 16px 0 0;
    padding: 20px 16px 32px; box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    animation: fadeIn 0.2s ease;
  }
}

/* ── Auth overlay ── */
#auth-overlay {
  position: fixed; inset: 0;
  background: rgba(15,23,42,0.92);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.25s ease;
}
#auth-box {
  background: #fff; border-radius: 16px;
  padding: 36px 32px; max-width: 360px; width: 92%;
  box-shadow: 0 24px 48px rgba(0,0,0,0.22);
}
#auth-box h2 { margin: 0 0 4px; font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -0.5px; }
#auth-box p { margin: 0 0 22px; font-size: 12px; color: #64748b; }
#auth-input {
  width: 100%; padding: 9px 11px; border-radius: 7px;
  border: 1.5px solid #e2e8f0; font-size: 14px;
  font-family: inherit; box-sizing: border-box;
  margin-bottom: 12px; outline: none;
  transition: border-color 0.15s;
}
#auth-input:focus { border-color: #4f46e5; }
#auth-btn {
  width: 100%; padding: 10px; border-radius: 7px; border: none;
  background: #4f46e5; color: #fff; font-weight: 700;
  font-size: 14px; cursor: pointer; font-family: inherit;
  transition: opacity 0.15s;
}
#auth-btn:hover { opacity: 0.88; }
#auth-btn:disabled { opacity: 0.5; cursor: default; }
#auth-err { color: #dc2626; font-size: 11px; margin: 8px 0 0; display: none; }
</style>
</head>
<body>
<div id="root"></div>

<!-- ── Auth (plain JS, runs before React) ── -->
<script>
window.AUTH_TOKEN = sessionStorage.getItem("cofit-auth") || "";

window.showPasswordPrompt = function(onSuccess) {
  if (document.getElementById("auth-overlay")) return;
  const overlay = document.createElement("div");
  overlay.id = "auth-overlay";
  overlay.innerHTML = `
    <div id="auth-box">
      <h2>COFIT</h2>
      <p>Digite a senha de acesso para continuar.</p>
      <input id="auth-input" type="password" placeholder="Senha..." autocomplete="current-password" />
      <button id="auth-btn">Entrar</button>
      <p id="auth-err">Senha incorreta. Tente novamente.</p>
    </div>
  `;
  document.body.appendChild(overlay);
  const input = document.getElementById("auth-input");
  const btn = document.getElementById("auth-btn");
  const err = document.getElementById("auth-err");

  async function tryLogin() {
    const val = input.value.trim();
    if (!val) return;
    btn.disabled = true;
    btn.textContent = "Verificando...";
    err.style.display = "none";
    try {
      const r = await fetch("/api/tasks", { headers: { "x-auth-token": val } });
      if (r.status === 401) {
        err.style.display = "block";
        input.value = "";
        btn.disabled = false;
        btn.textContent = "Entrar";
        input.focus();
      } else {
        window.AUTH_TOKEN = val;
        sessionStorage.setItem("cofit-auth", val);
        overlay.remove();
        if (typeof onSuccess === "function") onSuccess();
      }
    } catch {
      err.textContent = "Erro de conexão. Tente novamente.";
      err.style.display = "block";
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  }

  btn.addEventListener("click", tryLogin);
  input.addEventListener("keydown", e => e.key === "Enter" && tryLogin());
  setTimeout(() => input.focus(), 80);
};

window.mountApp = function() {};

if (!window.AUTH_TOKEN) {
  document.addEventListener("DOMContentLoaded", function() {
    window.showPasswordPrompt(function() { window.mountApp(); });
  });
}
</script>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
<script type="text/babel" data-type="module">
const { useState, useEffect, useCallback, useRef } = React;

/* ── Constants ── */
const COLUMNS = ["Inbox", "A fazer", "Em andamento", "Concluído", "Aguardando", "Snooze", "Algum dia"];
const COLLAPSIBLE_COLS = ["Concluído", "Aguardando", "Snooze", "Algum dia"]; // recolhidas por padrão (Fase 3.1c)
const COL_ACCENT = {
  Inbox:          "#9CA3AF",
  "A fazer":      "#3B82F6",
  "Em andamento": "#F59E0B",
  Concluído:      "#22C55E",
  Aguardando:     "#8B5CF6",
  Snooze:         "#06B6D4",
  "Algum dia":    "#E879A0",
};
/* helpers de pill bg (alpha sobre transparente, p/ usar em fundo dark) */
const statusBg       = (hex) => `color-mix(in oklch, ${hex} 18%, transparent)`;
const statusBgStrong = (hex) => `color-mix(in oklch, ${hex} 28%, transparent)`;
/* Aurora surface tokens (espelham as CSS vars p/ uso em styles inline) */
const AU = {
  bg: "#0c1224",
  surface: "#1a2240",
  surfaceHi: "#222b4d",
  surfaceAlt: "#0f1730",
  ink: "#eef1f7",
  inkMid: "#c2cae0",
  inkLow: "#8892ad",
  inkFaint: "#6a7391",
  hair: "#2a3352",
  hairSoft: "#1f284a",
  overdue: "#f59e0b",
  waitStrong: "#f59e0b",
};
/* ── Alertas de envelhecimento (Fase 3.5) ── */
const INBOX_STALE_DAYS = 5;          // cards no Inbox mais antigos que isso recebem alerta visual
const INBOX_STALE_COLOR = "#F59E0B"; // âmbar Aurora — borda esquerda + badge + linha no expandido

const TAG_COLORS = {
  ITCD: { bg: "#dbeddb", text: "#1a7a2e", border: "#b8dbb8" },
  IPVA: { bg: "#d3e5ef", text: "#24548d", border: "#a8cee0" },
  "Gestão de equipe": { bg: "#e8deee", text: "#6b3fa0", border: "#d4bfe0" },
  Administrativo: { bg: "#fadec9", text: "#9a6700", border: "#f0c9a0" },
  Institucional: { bg: "#ffe2dd", text: "#c4554d", border: "#f5c4bf" },
  "Sistemas/TI": { bg: "#fdecc8", text: "#9b6a12", border: "#f0d8a0" },
  Outro: { bg: "#e3e2e0", text: "#55534e", border: "#d0cfcc" },
};
const DEFAULT_TAG_COLOR = { bg: "#e8e8ff", text: "#5b5fc7", border: "#c8c8f0" };
const getTagColor = (tag) => TAG_COLORS[tag] || DEFAULT_TAG_COLOR;

/* ── Search helpers ── */
const norm = (s) => (s || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
function taskMatches(task, query) {
  if (!query) return true;
  const q = norm(query);
  const haystack = [
    task.title,
    task.description,
    (task.tags || []).join(" "),
    task.aguardando,
  ].map(norm).join(" ");
  return haystack.includes(q);
}

/* ── Helpers ── */
/* Para strings "YYYY-MM-DD" (sem hora), parseia como local para evitar off-by-one de fuso */
const parseDate = (iso) => { if (!iso) return null; if (/^\d{4}-\d{2}-\d{2}$/.test(iso)) { const [y,m,d] = iso.split("-"); return new Date(y, m-1, d); } return new Date(iso); };
const fmtDate = (iso) => { if (!iso) return "—"; try { return parseDate(iso).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" }); } catch { return iso; } };
const fmtDateShort = (iso) => { if (!iso) return "—"; try { return parseDate(iso).toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" }); } catch { return iso; } };
const isOverdue = (dl, col) => dl && col !== "Concluído" && new Date(dl) < new Date();
const isStaleInbox = (task) => {
  if (task.column !== "Inbox" || !task.createdAt) return false;
  const msPerDay = 86_400_000;
  return (Date.now() - new Date(task.createdAt).getTime()) > INBOX_STALE_DAYS * msPerDay;
};
const staleDays = (createdAt) => {
  if (!createdAt) return 0;
  return Math.floor((Date.now() - new Date(createdAt).getTime()) / 86_400_000);
};
const calcDuration = (s, e) => { if (!s || !e) return null; const ms = new Date(e) - new Date(s); if (ms < 0) return null; const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000); return h > 24 ? `${Math.floor(h / 24)}d ${h % 24}h` : `${h}h ${m}min`; };

/* ── API ── */
async function api(path, opts = {}) {
  const r = await fetch(path, {
    ...opts,
    headers: { "Content-Type": "application/json", "x-auth-token": window.AUTH_TOKEN || "", ...opts.headers },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (r.status === 401) {
    sessionStorage.removeItem("cofit-auth");
    window.AUTH_TOKEN = "";
    window.showPasswordPrompt(() => window.location.reload());
    throw new Error("Sessão expirada. Faça login novamente.");
  }
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
  return data;
}

/* ── Styles ── */
const inp = { width: "100%", padding: "7px 9px", borderRadius: 6, border: "1.5px solid #e2e8f0", fontSize: 12.5, fontFamily: "inherit", outline: "none", boxSizing: "border-box", background: "#fff", color: "#1e293b" };
const lbl = { display: "block", fontSize: 11.5, fontWeight: 600, color: "#475569", marginBottom: 4, marginTop: 12 };
const btnP = { padding: "7px 16px", borderRadius: 6, border: "none", background: "#4f46e5", color: "#fff", fontWeight: 600, fontSize: 12.5, cursor: "pointer", fontFamily: "inherit" };
const btnG = { padding: "7px 12px", borderRadius: 6, border: "1.5px solid #e2e8f0", background: "transparent", color: "#64748b", fontWeight: 500, fontSize: 12.5, cursor: "pointer", fontFamily: "inherit" };
const btnS = { padding: "3px 8px", borderRadius: 4, border: "1px solid #e2e8f0", background: "#fff", color: "#475569", fontSize: 10.5, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 };
/* Aurora card: surface dark; o acento da coluna aparece na top strip (não mais no border-left).
   overflow:visible — overflow:hidden cortava tags/footnote em cards estreitos. */
const cardBase = (accent, expanded) => ({
  background: expanded ? AU.surfaceHi : AU.surface,
  borderRadius: 10,
  boxShadow: expanded
    ? `0 16px 48px rgba(0,0,0,.5), 0 0 0 1px ${AU.hair}`
    : "0 2px 0 rgba(0,0,0,.25), inset 0 1px 0 rgba(255,255,255,.03)",
});

/* ── Components ── */

/* CHANGED: TagChip aceita onRemove para modo edição */
function TagChip({ tag, small, onRemove }) {
  const c = getTagColor(tag);
  return (
    <span style={{ display: "inline-flex", alignItems: "center", gap: 2, padding: small ? "1px 5px" : "2px 7px", borderRadius: 4, fontSize: small ? 9.5 : 11, fontWeight: 600, background: c.bg, color: c.text, border: `1px solid ${c.border}`, lineHeight: 1.5, whiteSpace: "nowrap" }}>
      {tag}
      {onRemove && <span onClick={e => { e.stopPropagation(); onRemove(tag); }} style={{ cursor: "pointer", marginLeft: 1, fontSize: small ? 10 : 12, opacity: 0.6, lineHeight: 1 }} title="Remover tag">×</span>}
    </span>
  );
}

/* NEW: editor de tags com autocomplete das existentes + criação de novas */
function TagEditor({ tags, allTags, onChange }) {
  const [input, setInput] = useState("");
  const [showSug, setShowSug] = useState(false);

  const suggestions = allTags.filter(t => !tags.includes(t) && t.toLowerCase().includes(input.toLowerCase()));

  function addTag(t) {
    const v = t.trim();
    if (v && !tags.includes(v)) onChange([...tags, v]);
    setInput("");
    setShowSug(false);
  }

  return (
    <div style={{ marginBottom: 5 }}>
      <span style={{ fontSize: 10, color: "#94a3b8", display: "block", marginBottom: 3 }}>Tags:</span>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginBottom: 4 }}>
        {tags.map(t => <TagChip key={t} tag={t} small onRemove={tag => onChange(tags.filter(x => x !== tag))} />)}
      </div>
      <div style={{ position: "relative" }}>
        <input
          value={input}
          onChange={e => { setInput(e.target.value); setShowSug(true); }}
          onFocus={() => setShowSug(true)}
          onBlur={() => setTimeout(() => setShowSug(false), 150)}
          onKeyDown={e => {
            if (e.key === "Enter" && input.trim()) { e.preventDefault(); addTag(input); }
            if (e.key === "Backspace" && !input && tags.length) onChange(tags.slice(0, -1));
          }}
          placeholder="Adicionar tag..."
          style={{ ...inp, fontSize: 11, padding: "4px 7px" }}
        />
        {showSug && (suggestions.length > 0 || (input.trim() && !tags.includes(input.trim()))) && (
          <div style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #e2e8f0", borderRadius: 6, boxShadow: "0 4px 12px rgba(0,0,0,0.1)", zIndex: 10, maxHeight: 130, overflowY: "auto", marginTop: 2 }}>
            {suggestions.map(s => (
              <div key={s} onMouseDown={() => addTag(s)} style={{ padding: "5px 8px", fontSize: 11, cursor: "pointer" }}
                onMouseEnter={e => e.currentTarget.style.background = "#f1f5f9"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <TagChip tag={s} small />
              </div>
            ))}
            {input.trim() && !allTags.includes(input.trim()) && !tags.includes(input.trim()) && (
              <div onMouseDown={() => addTag(input)} style={{ padding: "5px 8px", fontSize: 11, cursor: "pointer", color: "#4f46e5", fontWeight: 500 }}
                onMouseEnter={e => e.currentTarget.style.background = "#f1f5f9"} onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                + Criar "{input.trim()}"
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* Modal de confirmação para mover para "Aguardando" */
function AguardandoModal({ onConfirm, onCancel }) {
  const [text, setText] = useState("");
  const inputRef = useRef(null);
  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 60); }, []);
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(4px)" }}>
      <div style={{ background: "#fff", borderRadius: 12, padding: "22px 20px", maxWidth: 360, width: "92%", boxShadow: "0 16px 36px rgba(0,0,0,0.16)", animation: "fadeIn 0.15s ease" }}>
        <p style={{ margin: "0 0 4px", fontSize: 14, fontWeight: 700, color: "#0f172a" }}>Aguardando o quê?</p>
        <p style={{ margin: "0 0 14px", fontSize: 11.5, color: "#64748b" }}>Descreva o que está bloqueando esta tarefa.</p>
        <textarea
          ref={inputRef}
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey && text.trim()) { e.preventDefault(); onConfirm(text.trim()); } if (e.key === "Escape") onCancel(); }}
          placeholder="Ex: retorno da Claudia, aprovação do Bruno Bastos..."
          rows={3}
          style={{ ...inp, resize: "vertical", marginBottom: 14, fontSize: 12.5 }}
        />
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button onClick={onCancel} style={btnG}>Cancelar</button>
          <button onClick={() => text.trim() && onConfirm(text.trim())} disabled={!text.trim()} style={{ ...btnP, opacity: text.trim() ? 1 : 0.4 }}>Confirmar</button>
        </div>
      </div>
    </div>
  );
}

/* Modal de confirmação para mover para "Snooze" */
function SnoozeModal({ onConfirm, onCancel }) {
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const [date, setDate] = useState(tomorrow.toISOString().split("T")[0]);
  const inputRef = useRef(null);
  useEffect(() => { setTimeout(() => inputRef.current?.focus(), 60); }, []);
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.55)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(4px)" }}>
      <div style={{ background: "#fff", borderRadius: 12, padding: "22px 20px", maxWidth: 320, width: "92%", boxShadow: "0 16px 36px rgba(0,0,0,0.16)", animation: "fadeIn 0.15s ease" }}>
        <p style={{ margin: "0 0 4px", fontSize: 14, fontWeight: 700, color: "#0f172a" }}>Snooze até quando?</p>
        <p style={{ margin: "0 0 14px", fontSize: 11.5, color: "#64748b" }}>O card some da UI e volta para o Inbox na data escolhida.</p>
        <input
          ref={inputRef}
          type="date"
          value={date}
          min={tomorrow.toISOString().split("T")[0]}
          onChange={e => setDate(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && date) onConfirm(date); if (e.key === "Escape") onCancel(); }}
          style={{ ...inp, marginBottom: 14, fontSize: 14 }}
        />
        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button onClick={onCancel} style={btnG}>Cancelar</button>
          <button onClick={() => date && onConfirm(date)} disabled={!date} style={{ ...btnP, background: "#94a3b8", opacity: date ? 1 : 0.4 }}>Confirmar</button>
        </div>
      </div>
    </div>
  );
}

function Banner({ status, onDismiss }) {
  if (!status) return null;
  const isErr = status.type === "error";
  const bg = isErr ? "#fef2f2" : status.type === "success" ? "#f0fdf4" : "#eff6ff";
  const border = isErr ? "#fca5a5" : status.type === "success" ? "#86efac" : "#93c5fd";
  const color = isErr ? "#991b1b" : status.type === "success" ? "#166534" : "#1e40af";
  const icon = status.type === "syncing" ? "🔄" : isErr ? "⚠️" : "✅";
  return (
    <div style={{ background: bg, border: `1px solid ${border}`, borderRadius: 8, padding: "8px 14px", margin: "0 0 10px", animation: "fadeIn 0.2s ease", fontSize: 12, color }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <span style={{ display: "inline-block", animation: status.type === "syncing" ? "spin 1s linear infinite" : "none", flexShrink: 0 }}>{icon}</span>
        <span style={{ flex: 1, lineHeight: 1.4, fontWeight: 600 }}>{status.msg}</span>
        {status.type !== "syncing" && <button onClick={onDismiss} style={{ border: "none", background: "transparent", color: "#94a3b8", cursor: "pointer", fontSize: 14, padding: "0 2px", lineHeight: 1 }}>✕</button>}
      </div>
      {status.detail && <div style={{ fontSize: 10.5, color: isErr ? "#7f1d1d" : "#64748b", marginTop: 4, lineHeight: 1.5, wordBreak: "break-all", maxHeight: 80, overflowY: "auto", background: isErr ? "rgba(0,0,0,0.03)" : "transparent", borderRadius: 4, padding: isErr ? "4px 6px" : 0, fontFamily: isErr ? "monospace" : "inherit" }}>{status.detail}</div>}
    </div>
  );
}

function ProfileModal({ onSave, initial, onClose }) {
  const [role, setRole] = useState(initial?.role || "");
  const [areas, setAreas] = useState(initial?.areas || "");
  const [crit, setCrit] = useState(initial?.criterion || "");
  const ok = role && areas && crit;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.6)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000, backdropFilter: "blur(6px)" }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: "28px 24px", maxWidth: 420, width: "92%", boxShadow: "0 20px 40px rgba(0,0,0,0.18)" }}>
        <h2 style={{ margin: "0 0 4px", fontSize: 18, fontWeight: 700, color: "#0f172a" }}>Perfil</h2>
        <p style={{ margin: "0 0 18px", fontSize: 12, color: "#64748b" }}>Usado pela IA para priorizar melhor.</p>
        <label style={lbl}>Cargo</label>
        <select value={role} onChange={e => setRole(e.target.value)} style={inp}><option value="">Selecione...</option>{["Coordenador","Gestor","Auditor","Analista","Executor","Assessor"].map(o => <option key={o}>{o}</option>)}</select>
        <label style={lbl}>Áreas</label>
        <textarea value={areas} onChange={e => setAreas(e.target.value)} placeholder="Ex: ITCD, IPVA, gestão de equipe..." rows={2} style={{ ...inp, resize: "vertical" }} />
        <label style={lbl}>Critério dominante</label>
        <select value={crit} onChange={e => setCrit(e.target.value)} style={inp}><option value="">Selecione...</option>{["Prazo legal / regulatório","Impacto institucional / político","Volume operacional","Desenvolvimento de equipe","Entrega de projetos"].map(o => <option key={o}>{o}</option>)}</select>
        <div style={{ display: "flex", gap: 8, marginTop: 18 }}>
          {initial && <button onClick={onClose} style={{ ...btnG, flex: 1 }}>Cancelar</button>}
          <button onClick={() => ok && onSave({ role, areas, criterion: crit })} disabled={!ok} style={{ ...btnP, flex: 1, opacity: ok ? 1 : 0.4 }}>Salvar</button>
        </div>
      </div>
    </div>
  );
}

function AddForm({ onAdd, busy, initialOpen = false }) {
  const [title, setTitle] = useState(""); const [desc, setDesc] = useState(""); const [dl, setDl] = useState(""); const [open, setOpen] = useState(initialOpen);
  const submit = () => { if (!title.trim() || busy) return; onAdd({ title: title.trim(), description: desc.trim(), deadline: dl || null }); setTitle(""); setDesc(""); setDl(""); setOpen(false); };
  if (!open) return <button onClick={() => setOpen(true)} style={{ background: "linear-gradient(180deg, #eef1f7 0%, #c8cfe0 100%)", color: "#0c1224", border: "none", borderRadius: 999, padding: "7px 18px", fontSize: 13, fontWeight: 700, fontFamily: "Manrope, sans-serif", letterSpacing: -0.1, cursor: "pointer" }}>+ Nova tarefa</button>;
  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: 14, boxShadow: "0 2px 10px rgba(0,0,0,0.07)", marginBottom: 10 }}>
      <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Título..." onKeyDown={e => e.key === "Enter" && submit()} style={{ ...inp, fontWeight: 600, marginBottom: 5 }} autoFocus />
      <textarea value={desc} onChange={e => setDesc(e.target.value)} placeholder="Descrição..." rows={2} style={{ ...inp, resize: "vertical", marginBottom: 5 }} />
      <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
        <span style={{ fontSize: 11, color: "#64748b" }}>Prazo:</span>
        <input type="date" value={dl} onChange={e => setDl(e.target.value)} style={{ ...inp, width: "auto", padding: "4px 7px", fontSize: 11 }} />
        <div style={{ flex: 1 }} />
        <button onClick={() => setOpen(false)} style={btnG}>Cancelar</button>
        <button onClick={submit} disabled={!title.trim() || busy} style={{ ...btnP, opacity: !title.trim() || busy ? 0.5 : 1 }}>{busy ? "..." : "Adicionar"}</button>
      </div>
    </div>
  );
}

/* CHANGED: TaskCard recebe allTags, gerencia eTags, inclui TagEditor no modo edição; 4.2 adiciona DnD */
function TaskCard({ task, colIndex, onMove, onEdit, onDelete, onImprove, onReorder, processing, allTags, isNew, reordering, onDragStart, onDragEnd, isDragging, isMobile }) {
  const [open, setOpen] = useState(false);
  const [editing, setEditing] = useState(false);
  const suppressClickRef = useRef(false);
  const [eT, setET] = useState(task.title);
  const [eD, setED] = useState(task.description);
  const [eDl, setEDl] = useState(task.deadline || "");
  const [eTags, setETags] = useState(task.tags || []);
  const isProc = processing === task.id;
  const overdue = isOverdue(task.deadline, task.column);
  const isDone = task.column === "Concluído";
  const stale = isStaleInbox(task);

  useEffect(() => { setET(task.title); setED(task.description); setEDl(task.deadline || ""); setETags(task.tags || []); }, [task.title, task.description, task.deadline, JSON.stringify(task.tags)]);

  /* CHANGED: save passa tags editadas pelo usuário */
  const save = () => { if (!eT.trim()) return; onEdit(task.id, { title: eT.trim(), description: eD.trim(), deadline: eDl || null, tags: eTags }); setEditing(false); };

  if (editing) return (
    <div style={{ ...cardBase(COL_ACCENT[task.column], true), overflow: "visible", padding: 12, marginBottom: 12 }}>
      <input value={eT} onChange={e => setET(e.target.value)} style={{ ...inp, fontWeight: 600, fontSize: 12, marginBottom: 5 }} autoFocus />
      <textarea value={eD} onChange={e => setED(e.target.value)} rows={3} style={{ ...inp, fontSize: 11, resize: "vertical", marginBottom: 5 }} />
      {/* NEW: editor de tags inline */}
      <TagEditor tags={eTags} allTags={allTags} onChange={setETags} />
      <div style={{ display: "flex", alignItems: "center", gap: 5, marginBottom: 7 }}><span style={{ fontSize: 10, color: AU.inkLow }}>Prazo:</span><input type="date" value={eDl} onChange={e => setEDl(e.target.value)} style={{ ...inp, width: "auto", padding: "3px 5px", fontSize: 10 }} /></div>
      <div style={{ display: "flex", gap: 5, justifyContent: "flex-end" }}>
        <button onClick={() => { setET(task.title); setED(task.description); setEDl(task.deadline || ""); setETags(task.tags || []); setEditing(false); }} style={{ ...btnS, background: "#f1f5f9" }}>Cancelar</button>
        <button onClick={save} style={{ ...btnS, background: "#4f46e5", color: "#fff" }}>Salvar</button>
      </div>
    </div>
  );

  /* Card recém-criado: aro índigo destacado (sem quebrar top strip Aurora) */
  const newStyle = isNew ? {
    boxShadow: "0 0 0 2px #4f46e5, 0 4px 16px rgba(79,70,229,0.35)",
  } : {};

  const accent = COL_ACCENT[task.column];
  const stripColor = overdue ? "#ef4444" : stale ? INBOX_STALE_COLOR : accent;
  const overdueDays = overdue ? Math.max(1, Math.floor((Date.now() - new Date(task.deadline).getTime()) / 86_400_000)) : 0;
  const isSnoozeCol = task.column === "Snooze";
  const isAguardCol = task.column === "Aguardando";

  const canDrag = !editing && !isProc && !isNew && !isMobile;

  return (
    <div
      className="card-wrap"
      draggable={canDrag}
      onDragStart={canDrag ? (e) => {
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", task.id);
        onDragStart && onDragStart(task.id, task.column);
      } : undefined}
      onDragEnd={canDrag ? () => {
        onDragEnd && onDragEnd();
        // Suprime o próximo click por 100ms para não abrir/fechar o card após drag
        suppressClickRef.current = true;
        setTimeout(() => { suppressClickRef.current = false; }, 100);
      } : undefined}
      style={{
        ...cardBase(accent, open), ...newStyle,
        opacity: isDragging ? 0.35 : isProc ? 0.5 : isDone ? 0.72 : 1,
        position: "relative", marginBottom: 12, transition: "opacity 0.15s",
        cursor: canDrag ? "grab" : "default",
      }}
    >
      {isProc && <div style={{ position: "absolute", inset: 0, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(12,18,36,0.72)", borderRadius: 10, zIndex: 2 }}><span style={{ fontSize: 11, color: AU.ink, fontWeight: 600 }}>Processando...</span></div>}

      {/* Top strip Aurora: dot + barra (encurtada) + badges + seta — tudo numa linha */}
      <div onClick={() => { if (!suppressClickRef.current) setOpen(!open); }} style={{ display: "flex", alignItems: "center", gap: 8, padding: "11px 14px 0", cursor: "pointer" }}>
        <span style={{ width: 8, height: 8, borderRadius: "50%", background: stripColor, boxShadow: `0 0 0 3px ${stripColor}22`, flexShrink: 0 }} />
        <div style={{ flex: 1, maxWidth: 48, height: 2.5, borderRadius: 2, background: stripColor, opacity: 0.9 }} />
        {isNew && (
          <span style={{
            display: "inline-flex", alignItems: "center", whiteSpace: "nowrap",
            fontSize: 10, fontWeight: 700, letterSpacing: 0.3,
            color: "#a5b4fc", border: "1px solid #a5b4fc66",
            padding: "1px 7px", borderRadius: 999,
            fontFamily: '"JetBrains Mono", ui-monospace, monospace',
          }}>NOVA</span>
        )}
        {!isNew && overdue && (
          <span style={{
            display: "inline-flex", alignItems: "center", whiteSpace: "nowrap",
            fontSize: 10, fontWeight: 500, letterSpacing: 0.3,
            color: AU.overdue, border: `1px solid ${AU.overdue}66`,
            padding: "1px 7px", borderRadius: 999,
          }}>atrasado {overdueDays}d</span>
        )}
        {!isNew && !overdue && stale && (
          <span title={`No Inbox há ${staleDays(task.createdAt)} dias — aguardando triagem`}
            style={{
              display: "inline-flex", alignItems: "center", whiteSpace: "nowrap",
              fontSize: 10, fontWeight: 500, letterSpacing: 0.3,
              color: INBOX_STALE_COLOR, border: `1px solid ${INBOX_STALE_COLOR}66`,
              padding: "1px 7px", borderRadius: 999,
            }}>{staleDays(task.createdAt)}d no Inbox</span>
        )}
        <span style={{ flex: 1 }} />
        <span style={{ color: AU.inkFaint, fontSize: 10, lineHeight: 1, transition: "transform 0.2s", transform: open ? "rotate(180deg)" : "none" }}>▾</span>
      </div>

      <div onClick={() => { if (!suppressClickRef.current) setOpen(!open); }} style={{ padding: "6px 16px 14px", cursor: "pointer" }}>
        {/* Título Inter Tight 450/16/1.45 justificado com hyphens */}
        <div style={{
          fontFamily: '"Inter Tight", Inter, sans-serif',
          fontSize: 16, lineHeight: 1.45, color: AU.ink, letterSpacing: 0.1,
          fontWeight: 450, textAlign: "justify", hyphens: "auto",
          marginBottom: (task.tags?.length || task.deadline || task.aguardando || task.snoozeUntil) ? 12 : 0,
        }}>
          {task.title}
        </div>

        {/* Tags + footnotes (deadline / aguardando / snooze) — só quando colapsado */}
        {!open && (task.tags?.length > 0 || task.deadline || task.aguardando || task.snoozeUntil) && (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
            {(task.tags || []).map(t => <TagChip key={t} tag={t} />)}
            {task.deadline && (
              <span style={{
                fontSize: 10.5, fontWeight: 500,
                color: overdue ? AU.overdue : AU.inkMid,
                fontFamily: '"JetBrains Mono", ui-monospace, monospace',
                letterSpacing: 0.2,
              }}>📅 {fmtDateShort(task.deadline)}</span>
            )}
            {isAguardCol && task.aguardando && (
              <span style={{
                display: "inline-flex", alignItems: "center", gap: 5,
                fontSize: 11.5, color: AU.inkMid, fontWeight: 400,
                width: "100%", lineHeight: 1.4,
              }} title={task.aguardando}>
                <span style={{ opacity: 0.6, flexShrink: 0 }}>↳</span>
                <span style={{ wordBreak: "break-word" }}>{task.aguardando}</span>
              </span>
            )}
            {isSnoozeCol && task.snoozeUntil && (
              <span style={{
                display: "inline-flex", alignItems: "center", gap: 5,
                fontSize: 11.5, color: COL_ACCENT.Snooze, fontWeight: 500,
                background: statusBg(COL_ACCENT.Snooze),
                padding: "3px 9px", borderRadius: 999,
              }}>
                <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M3 3h3.5L3 7h3.5M7.5 6.5h3l-3 3h3"/>
                </svg>
                até {fmtDateShort(task.snoozeUntil)}
              </span>
            )}
          </div>
        )}
      </div>

      {/* Botões de destino — card novo: pills Aurora */}
      {isNew && (
        <div style={{ display: "flex", gap: 5, flexWrap: "wrap", padding: "0 16px 14px", alignItems: "center" }}>
          {COLUMNS.filter(c => c !== task.column).map(c => {
            const acc = COL_ACCENT[c];
            return (
              <button key={c} onClick={e => { e.stopPropagation(); onMove(task.id, c); }}
                style={{
                  border: "none", background: statusBg(acc), color: acc,
                  fontSize: 11, fontWeight: 600, padding: "4px 11px", borderRadius: 999,
                  cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
                }}>{c}</button>
            );
          })}
          <div style={{ flex: 1, minWidth: 4 }} />
          <button onClick={e => { e.stopPropagation(); setEditing(true); }}
            title="Editar"
            style={{ background: AU.surfaceAlt, border: "none", color: COL_ACCENT["A fazer"],
              width: 28, height: 26, borderRadius: 6, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
            }}>✎</button>
          <button onClick={e => { e.stopPropagation(); if (confirm("Arquivar esta tarefa no Notion?")) onDelete(task.id); }}
            title="Arquivar no Notion"
            style={{ background: AU.surfaceAlt, border: "none", color: "#f87171",
              width: 28, height: 26, borderRadius: 6, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
            }}>🗑</button>
        </div>
      )}

      {open && (
        <div style={{ padding: "0 16px 14px", animation: "fadeIn 0.15s ease" }}>
          {/* Descrição: 13.5px/1.65 justificada, ink-mid */}
          {task.description && (
            <p style={{
              fontSize: 13.5, lineHeight: 1.65, color: AU.inkMid,
              margin: "0 0 14px", textAlign: "justify", hyphens: "auto",
              whiteSpace: "pre-wrap", wordBreak: "break-word",
            }}>{task.description}</p>
          )}

          {/* Aguardando: linha com ↳ em ink-mid (sem emoji ⏸) */}
          {task.aguardando && (
            <p style={{
              fontSize: 12, color: AU.inkMid, margin: "0 0 12px",
              wordBreak: "break-word", display: "flex", gap: 6, alignItems: "flex-start",
            }}>
              <span style={{ opacity: 0.6, flexShrink: 0 }}>↳</span>
              <span><span style={{ color: COL_ACCENT.Aguardando, fontWeight: 500 }}>Aguardando:</span> {task.aguardando}</span>
            </p>
          )}

          {/* Snooze: pill ciano com ícone zzz */}
          {task.snoozeUntil && (
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 6,
              fontSize: 11.5, color: COL_ACCENT.Snooze, fontWeight: 500,
              background: statusBg(COL_ACCENT.Snooze),
              padding: "3px 9px", borderRadius: 999,
              marginBottom: 12,
            }}>
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 3h3.5L3 7h3.5M7.5 6.5h3l-3 3h3"/>
              </svg>
              retorna em {fmtDateShort(task.snoozeUntil)}
            </div>
          )}

          {/* Reason (quando IA sugeriu) — discreto */}
          {task.reason && (
            <p style={{
              fontSize: 11.5, color: AU.inkFaint, margin: "0 0 12px",
              fontStyle: "italic", wordBreak: "break-word",
            }}>💡 {task.reason}</p>
          )}

          {/* Duration do concluído */}
          {isDone && task.duration && (
            <p style={{
              fontSize: 11.5, color: COL_ACCENT.Concluído, margin: "0 0 10px",
              fontFamily: '"JetBrains Mono", ui-monospace, monospace', fontWeight: 500,
            }}>⏱ {task.duration}</p>
          )}

          {/* Bloco slug/datas em mono sobre surfaceAlt */}
          <div style={{
            background: AU.surfaceAlt, padding: "10px 12px", borderRadius: 6,
            fontFamily: '"JetBrains Mono", ui-monospace, monospace',
            fontSize: 10.5, color: AU.inkMid, lineHeight: 1.7, marginBottom: 14,
          }}>
            <div><span style={{ color: AU.inkLow }}>Criado&nbsp;&nbsp;&nbsp;</span> {fmtDate(task.createdAt)}</div>
            {task.startedAt && <div><span style={{ color: AU.inkLow }}>Iniciado&nbsp;</span> {fmtDate(task.startedAt)}</div>}
            {task.completedAt && <div><span style={{ color: AU.inkLow }}>Concluído</span> {fmtDate(task.completedAt)}</div>}
            {task.deadline && <div><span style={{ color: AU.inkLow }}>Prazo&nbsp;&nbsp;&nbsp;&nbsp;</span> {fmtDateShort(task.deadline)}</div>}
          </div>

          {/* Linha âmbar "No Inbox há N dias — aguardando triagem" (opção 1 do brief) */}
          {stale && (
            <div style={{
              display: "flex", alignItems: "center", gap: 7, marginBottom: 14,
              fontSize: 12.5, color: AU.waitStrong, fontWeight: 500,
            }}>
              <svg width="13" height="13" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
                <circle cx="6" cy="6" r="4.5"/><path d="M6 3.5v3l1.8 1.2"/>
              </svg>
              No Inbox há <strong style={{ fontWeight: 700 }}>{staleDays(task.createdAt)} dias</strong> — aguardando triagem
            </div>
          )}

          {/* Mover para: pills Aurora */}
          <div style={{
            marginBottom: 12, paddingBottom: 0,
          }}>
            <div style={{
              fontSize: 10, color: AU.inkLow, letterSpacing: 0.8,
              textTransform: "uppercase", marginBottom: 7, fontWeight: 500,
              fontFamily: '"JetBrains Mono", ui-monospace, monospace',
            }}>mover para</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
              {COLUMNS.filter(c => c !== task.column).map(c => {
                const acc = COL_ACCENT[c];
                return (
                  <button key={c} onClick={e => { e.stopPropagation(); onMove(task.id, c); }}
                    style={{
                      border: "none", background: statusBg(acc), color: acc,
                      fontSize: 11, fontWeight: 600, padding: "4px 11px", borderRadius: 999,
                      cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
                    }}>{c}</button>
                );
              })}
            </div>
          </div>

          {/* Toolbar ↑ ↓ ✨ ✏️ 🗑 (snooze vai pela pill ciano acima) */}
          <div style={{
            paddingTop: 12, borderTop: `1px solid ${AU.hairSoft}`,
            display: "flex", gap: 6, color: AU.inkMid, flexWrap: "wrap",
          }}>
            <div style={{ flex: 1 }} />
            {!isDone && onReorder && (
              <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "up"); }} disabled={reordering}
                title="Mover para cima"
                style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
                  width: 30, height: 28, borderRadius: 6, fontSize: 13,
                  cursor: reordering ? "not-allowed" : "pointer", opacity: reordering ? 0.4 : 1, fontFamily: "inherit",
                }}>{reordering ? "⏳" : "↑"}</button>
            )}
            {!isDone && onReorder && (
              <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "down"); }} disabled={reordering}
                title="Mover para baixo"
                style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
                  width: 30, height: 28, borderRadius: 6, fontSize: 13,
                  cursor: reordering ? "not-allowed" : "pointer", opacity: reordering ? 0.4 : 1, fontFamily: "inherit",
                }}>{reordering ? "⏳" : "↓"}</button>
            )}
            <button onClick={e => { e.stopPropagation(); onImprove(task.id); }}
              title="Melhorar com IA"
              style={{ background: AU.surfaceAlt, border: "none", color: "#a5b4fc",
                width: 30, height: 28, borderRadius: 6, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
              }}>✨</button>
            <button onClick={e => { e.stopPropagation(); setEditing(true); }}
              title="Editar"
              style={{ background: AU.surfaceAlt, border: "none", color: COL_ACCENT["A fazer"],
                width: 30, height: 28, borderRadius: 6, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
              }}>✎</button>
            <button onClick={e => { e.stopPropagation(); if (confirm("Arquivar esta tarefa no Notion?")) onDelete(task.id); }}
              title="Arquivar no Notion"
              style={{ background: AU.surfaceAlt, border: "none", color: "#f87171",
                width: 30, height: 28, borderRadius: 6, fontSize: 13, cursor: "pointer", fontFamily: "inherit",
              }}>🗑</button>
          </div>
        </div>
      )}

      {/* Inbox (colIndex=0): pills Aurora de destino + ↑↓, sempre visíveis */}
      {!open && !isNew && colIndex === 0 && (
        <div style={{ display: "flex", gap: 5, padding: "0 16px 14px", alignItems: "center", flexWrap: "wrap" }}>
          {COLUMNS.filter(c => c !== task.column).map(c => {
            const acc = COL_ACCENT[c];
            return (
              <button key={c} onClick={e => { e.stopPropagation(); onMove(task.id, c); }}
                style={{
                  border: "none", background: statusBg(acc), color: acc,
                  fontSize: 11, fontWeight: 600, padding: "4px 11px", borderRadius: 999,
                  cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap",
                }}>{c}</button>
            );
          })}
          <div style={{ flex: 1, minWidth: 4 }} />
          {onReorder && (
            <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "up"); }} disabled={reordering}
              title="Mover para cima"
              style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
                width: 26, height: 24, borderRadius: 6, fontSize: 12,
                cursor: reordering ? "not-allowed" : "pointer", opacity: reordering ? 0.4 : 1, fontFamily: "inherit",
              }}>{reordering ? "⏳" : "↑"}</button>
          )}
          {onReorder && (
            <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "down"); }} disabled={reordering}
              title="Mover para baixo"
              style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
                width: 26, height: 24, borderRadius: 6, fontSize: 12,
                cursor: reordering ? "not-allowed" : "pointer", opacity: reordering ? 0.4 : 1, fontFamily: "inherit",
              }}>{reordering ? "⏳" : "↓"}</button>
          )}
        </div>
      )}

      {/* Outras colunas: hover-actions (setas ←→ + ↑↓) em tema dark */}
      {!open && !isNew && colIndex > 0 && (
        <div className="hover-actions" style={{ position: "absolute", right: 8, top: 8, display: "none", gap: 3 }}>
          <button onClick={e => { e.stopPropagation(); onMove(task.id, COLUMNS[colIndex - 1]); }}
            style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
              width: 22, height: 20, borderRadius: 5, fontSize: 10, cursor: "pointer", fontFamily: "inherit",
            }}>←</button>
          {colIndex < COLUMNS.length - 1 && (
            <button onClick={e => { e.stopPropagation(); onMove(task.id, COLUMNS[colIndex + 1]); }}
              style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
                width: 22, height: 20, borderRadius: 5, fontSize: 10, cursor: "pointer", fontFamily: "inherit",
              }}>→</button>
          )}
          {onReorder && (
            <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "up"); }} disabled={reordering}
              style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
                width: 22, height: 20, borderRadius: 5, fontSize: 10,
                cursor: reordering ? "not-allowed" : "pointer", opacity: reordering ? 0.4 : 1, fontFamily: "inherit",
              }} title="Mover para cima">{reordering ? "⏳" : "↑"}</button>
          )}
          {onReorder && (
            <button onClick={e => { e.stopPropagation(); if (!reordering) onReorder(task.id, "down"); }} disabled={reordering}
              style={{ background: AU.surfaceAlt, border: "none", color: AU.inkMid,
                width: 22, height: 20, borderRadius: 5, fontSize: 10,
                cursor: reordering ? "not-allowed" : "pointer", opacity: reordering ? 0.4 : 1, fontFamily: "inherit",
              }} title="Mover para baixo">{reordering ? "⏳" : "↓"}</button>
          )}
        </div>
      )}
    </div>
  );
}

/* ── SearchInput ── */
function SearchInput({ value, onChange, count, mobile }) {
  const ref = useRef(null);

  useEffect(() => {
    const h = (e) => {
      if (
        (e.key === "/" || (e.ctrlKey && e.key === "k")) &&
        document.activeElement.tagName !== "INPUT" &&
        document.activeElement.tagName !== "TEXTAREA"
      ) {
        e.preventDefault();
        ref.current?.focus();
      }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const hasText = value.length > 0;

  return (
    <div style={{ position: "relative", display: "flex", alignItems: "center", gap: 6 }}>
      <div style={{ position: "relative", display: "flex", alignItems: "center" }}>
        <span style={{ position: "absolute", left: 8, fontSize: 12, color: AU.inkFaint, pointerEvents: "none", lineHeight: 1 }}>🔍</span>
        <input
          ref={ref}
          value={value}
          onChange={e => onChange(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Escape") { onChange(""); ref.current?.blur(); }
          }}
          placeholder={mobile ? "Buscar..." : "Buscar (/ ou Ctrl+K)..."}
          style={{
            padding: "5px 28px 5px 26px",
            borderRadius: 6,
            border: `1.5px solid ${hasText ? COL_ACCENT["Em andamento"] + "88" : AU.hair}`,
            background: AU.surface,
            color: AU.ink,
            fontSize: 12,
            fontFamily: "inherit",
            outline: "none",
            width: mobile ? "100%" : 220,
            boxSizing: "border-box",
            transition: "border-color 0.15s",
          }}
        />
        {hasText && (
          <button
            onClick={() => { onChange(""); ref.current?.focus(); }}
            style={{
              position: "absolute", right: 5,
              background: "transparent", border: "none", color: AU.inkFaint,
              fontSize: 14, cursor: "pointer", padding: "0 2px", lineHeight: 1,
              display: "flex", alignItems: "center",
            }}
            title="Limpar busca"
          >✕</button>
        )}
      </div>
      {hasText && (
        <span style={{
          fontSize: 11, color: count > 0 ? COL_ACCENT["A fazer"] : AU.inkFaint,
          fontFamily: '"JetBrains Mono", ui-monospace, monospace',
          fontWeight: 600, whiteSpace: "nowrap",
        }}>
          {count > 0 ? `${count} encontrada${count !== 1 ? "s" : ""}` : "0 encontradas"}
        </span>
      )}
    </div>
  );
}
