/* CHANGED: Column recebe e repassa allTags, newCardId; 4.2 adiciona DnD */
function Column({ name, tasks, colIndex, onMove, onEdit, onDelete, onImprove, onReorder, processing, allTags, onCollapse, newCardId, reordering, dragging, onDropTargetChange, dropTarget, onDrop, isMobile, onDragStart, onDragEnd }) {
  const [showAll, setShowAll] = useState(false);
  const containerRef = useRef(null);
  const isDone = name === "Concluído";
  const accent = COL_ACCENT[name];

  /* Card novo sempre no topo; Snooze ordenado por snoozeUntil asc; demais por ordem */
  const isSnooze = name === "Snooze";
  const sorted = [...tasks].sort((a, b) => {
    if (a.id === newCardId) return -1;
    if (b.id === newCardId) return 1;
    if (isSnooze) {
      const da = a.snoozeUntil || "9999";
      const db = b.snoozeUntil || "9999";
      return da.localeCompare(db);
    }
    return (a.ordem ?? Infinity) - (b.ordem ?? Infinity);
  });
  const visible = isDone && !showAll ? sorted.slice(0, 5) : sorted;
  const hidden = isDone ? sorted.length - visible.length : 0;

  /* Calcula índice de inserção baseado na posição Y do mouse */
  function computeDropIndex(clientY) {
    const container = containerRef.current;
    if (!container) return visible.length;
    const cards = Array.from(container.querySelectorAll("[data-card-id]"));
    for (let i = 0; i < cards.length; i++) {
      const rect = cards[i].getBoundingClientRect();
      if (clientY < rect.top + rect.height / 2) return i;
    }
    return cards.length;
  }

  const isDropTarget = dropTarget?.col === name;

  return (
    <div
      style={{ flex: 1, minWidth: 240, display: "flex", flexDirection: "column", maxHeight: "calc(100vh - 150px)", background: "transparent", padding: "0 0 6px" }}
      onDragOver={dragging ? (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        const idx = computeDropIndex(e.clientY);
        if (!isDropTarget || dropTarget?.index !== idx) {
          onDropTargetChange({ col: name, index: idx });
        }
      } : undefined}
      onDrop={dragging ? (e) => {
        e.preventDefault();
        if (!dropTarget) return;
        onDrop(dragging.id, dragging.sourceCol, dropTarget.col, dropTarget.index);
      } : undefined}
      onDragLeave={dragging ? (e) => {
        if (!containerRef.current?.contains(e.relatedTarget)) {
          if (isDropTarget) onDropTargetChange(null);
        }
      } : undefined}
    >
      {/* Header Aurora: título Inter Tight 19/600 + contador Fraunces 28, ambos na cor do status */}
      <div
        onClick={onCollapse || undefined}
        title={onCollapse ? "Clique para recolher" : undefined}
        style={{
          display: "flex", alignItems: "baseline", gap: 12,
          padding: "14px 14px 11px",
          borderBottom: `1px solid ${isDropTarget ? accent + "55" : AU.hair}`,
          flexShrink: 0,
          cursor: onCollapse ? "pointer" : "default",
          transition: "border-color 0.15s",
        }}
      >
        <span style={{
          fontFamily: '"Inter Tight", Inter, sans-serif',
          fontSize: 19, fontWeight: 600, letterSpacing: -0.3,
          color: accent, whiteSpace: "nowrap", flex: 1, lineHeight: 1,
        }}>{name}</span>
        <span style={{
          fontFamily: 'Fraunces, serif',
          fontSize: 28, fontWeight: 500, lineHeight: 0.9, letterSpacing: -1,
          color: accent, fontVariantNumeric: "tabular-nums",
        }}>{String(tasks.length).padStart(2, "0")}</span>
        {onCollapse && (
          <span style={{ color: AU.inkFaint, fontSize: 12, lineHeight: 1, userSelect: "none", marginLeft: 4 }}>⟨</span>
        )}
      </div>
      <div ref={containerRef} style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "7px 6px 3px", display: "flex", flexDirection: "column", gap: 5 }}>
        {visible.map((t, i) => (
          <React.Fragment key={t.id}>
            {isDropTarget && dropTarget.index === i && <DropIndicator accent={accent} />}
            <div data-card-id={t.id}>
              <TaskCard
                task={t} colIndex={colIndex} onMove={onMove} onEdit={onEdit} onDelete={onDelete}
                onImprove={onImprove} onReorder={onReorder} processing={processing} allTags={allTags}
                isNew={t.id === newCardId} reordering={reordering}
                onDragStart={onDragStart} onDragEnd={onDragEnd}
                isDragging={dragging?.id === t.id}
                isMobile={isMobile}
              />
            </div>
          </React.Fragment>
        ))}
        {isDropTarget && dropTarget.index === visible.length && <DropIndicator accent={accent} />}
        {!tasks.length && !dragging && <p style={{ fontSize: 12, color: AU.inkFaint, textAlign: "center", padding: 24, fontStyle: "italic" }}>Nenhuma tarefa</p>}
        {hidden > 0 && <button onClick={() => setShowAll(true)} style={{ ...btnG, fontSize: 10, padding: "5px 0", textAlign: "center", width: "100%", border: "1px dashed #cbd5e1" }}>+ {hidden} anterior{hidden > 1 ? "es" : ""}</button>}
        {isDone && showAll && sorted.length > 5 && <button onClick={() => setShowAll(false)} style={{ ...btnG, fontSize: 10, padding: "5px 0", textAlign: "center", width: "100%", border: "1px dashed #cbd5e1" }}>Mostrar menos</button>}
      </div>
    </div>
  );
}

/* ── Main App ── */
function App() {
  const [tasks, setTasks] = useState([]);
  const [profile, setProfile] = useState(() => {
    try { return JSON.parse(localStorage.getItem("cofit-profile")); } catch { return null; }
  });
  const [collapsedCols, setCollapsedCols] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("cofit-collapsed"));
      if (!saved) {
        // Primeira vez: recolhe todas as recolhíveis por padrão e marca migração feita
        localStorage.setItem("cofit-col-migrated", "3.1c");
        return COLLAPSIBLE_COLS;
      }
      // Migração 3.1c: roda uma única vez para adicionar as novas colunas ao estado salvo
      if (!localStorage.getItem("cofit-col-migrated")) {
        const merged = [...new Set([...saved, "Aguardando", "Snooze", "Algum dia"])];
        localStorage.setItem("cofit-collapsed", JSON.stringify(merged));
        localStorage.setItem("cofit-col-migrated", "3.1c");
        return merged;
      }
      // Sessões subsequentes: respeita exatamente o que o usuário deixou salvo
      return saved;
    } catch { return COLLAPSIBLE_COLS; }
  });
  const [showProfile, setShowProfile] = useState(false);
  const [loading, setLoading] = useState(true);
  const [loadError, setLoadError] = useState(null);
  const [processing, setProcessing] = useState(null);
  const [banner, setBanner] = useState(null);
  const [newCardId, setNewCardId] = useState(null);
  const [mobileCol, setMobileCol] = useState(0); // índice da coluna visível no mobile
  const [showMobileAdd, setShowMobileAdd] = useState(false);
  const [reorderingCol, setReorderingCol] = useState(new Set()); // colunas com operação de reordenação em voo
  const [aguardandoPending, setAguardandoPending] = useState(null); // { id, target } aguardando input do modal
  const [snoozePending, setSnoozePending] = useState(null); // { id, target } aguardando data do snooze
  const [search, setSearch] = useState("");
  const [searchDebounced, setSearchDebounced] = useState("");
  const [showMobileSearch, setShowMobileSearch] = useState(false);
  const prevCollapsedRef = useRef(null); // snapshot de collapsedCols antes da busca
  const [dragging, setDragging] = useState(null); // { id, sourceCol }
  const [dropTarget, setDropTarget] = useState(null); // { col, index }
  const allTags = [...new Set(tasks.flatMap(t => t.tags || []))];

  function toggleCol(name) {
    setCollapsedCols(prev => {
      const next = prev.includes(name) ? prev.filter(c => c !== name) : [...prev, name];
      localStorage.setItem("cofit-collapsed", JSON.stringify(next));
      return next;
    });
  }

  useEffect(() => { fetchTasks(); }, []);
  useEffect(() => { if (!loading && !profile) setShowProfile(true); }, [loading, profile]);

  // Cursor grabbing durante DnD
  useEffect(() => {
    document.body.style.cursor = dragging ? "grabbing" : "";
    return () => { document.body.style.cursor = ""; };
  }, [!!dragging]);

  // Debounce da busca: 150ms
  useEffect(() => {
    const t = setTimeout(() => setSearchDebounced(search), 150);
    return () => clearTimeout(t);
  }, [search]);

  // Expande/restaura colunas durante busca
  useEffect(() => {
    if (searchDebounced && prevCollapsedRef.current === null) {
      prevCollapsedRef.current = collapsedCols;
      setCollapsedCols([]);
    } else if (!searchDebounced && prevCollapsedRef.current !== null) {
      setCollapsedCols(prevCollapsedRef.current);
      prevCollapsedRef.current = null;
    }
  }, [searchDebounced]);

  // Renumera sequencialmente (1..N) as tasks de uma coluna.
  // Retorna { updatedTasks, changed } onde `changed` contém só as tasks cujo valor de ordem mudou.
  function renumberColumn(allTasks, colName, currentNewCardId) {
    const colTasks = allTasks.filter(t => t.column === colName);
    const sorted = [...colTasks].sort((a, b) => {
      if (a.id === currentNewCardId) return -1;
      if (b.id === currentNewCardId) return 1;
      const oa = a.ordem ?? Infinity;
      const ob = b.ordem ?? Infinity;
      if (oa !== ob) return oa - ob;
      return (a.createdAt || "").localeCompare(b.createdAt || ""); // desempate estável
    });
    const changed = [];
    const newOrderById = new Map();
    sorted.forEach((t, i) => {
      const newOrdem = i + 1;
      if (t.ordem !== newOrdem) changed.push({ id: t.id, ordem: newOrdem });
      newOrderById.set(t.id, newOrdem);
    });
    const updatedTasks = allTasks.map(t =>
      newOrderById.has(t.id) ? { ...t, ordem: newOrderById.get(t.id) } : t
    );
    return { updatedTasks, changed };
  }

  async function fetchTasks() {
    setLoading(true); setLoadError(null);
    try {
      const data = await api("/api/tasks");
      let fetched = data.tasks || [];

      // 3.4 — Acorda cards com Snooze vencido: move para Inbox e coloca no topo
      const today = new Date().toISOString().split("T")[0]; // "YYYY-MM-DD"
      const vencidos = fetched.filter(t => t.column === "Snooze" && t.snoozeUntil && t.snoozeUntil <= today);
      if (vencidos.length > 0) {
        const vencidosIds = new Set(vencidos.map(v => v.id));
        // Move localmente para Inbox + limpa snooze. ordem=0 garante que ficam antes
        // de qualquer card já existente no Inbox; renumberColumn normaliza para 1..N.
        let next = fetched.map(t =>
          vencidosIds.has(t.id) ? { ...t, column: "Inbox", snoozeUntil: null, ordem: 0 } : t
        );
        const { updatedTasks, changed } = renumberColumn(next, "Inbox", null);
        next = updatedTasks;

        // Persiste: cada vencido (com ordem final) + renumerações dos outros do Inbox
        const ordemFinalById = new Map(updatedTasks.map(t => [t.id, t.ordem]));
        const patches = [
          ...vencidos.map(t => api(`/api/tasks/${t.id}`, {
            method: "PATCH",
            body: { column: "Inbox", snoozeUntil: null, ordem: ordemFinalById.get(t.id) }
          })),
          ...changed
            .filter(c => !vencidosIds.has(c.id))
            .map(c => api(`/api/tasks/${c.id}`, { method: "PATCH", body: { ordem: c.ordem } }))
        ];
        await Promise.all(patches);
        fetched = next;
      }

      setTasks(fetched);
    } catch (e) {
      if (!e.message.includes("expirada")) setLoadError(e.message);
    }
    setLoading(false);
  }

  function updateLocal(id, changes) {
    setTasks(prev => prev.map(t => t.id === id ? { ...t, ...changes } : t));
  }

  async function handleAdd({ title, description, deadline }) {
    setProcessing("new");
    try {
      let polished = null;
      try { polished = await api("/api/ai-polish", { method: "POST", body: { title, description, existingTags: allTags, profile } }); } catch {}
      const taskData = { title: polished?.title || title, description: polished?.description || description, tags: polished?.tags || [], deadline, column: "Inbox", createdAt: new Date().toISOString() };
      const data = await api("/api/tasks", { method: "POST", body: taskData });
      setTasks(prev => [...prev, data.task]);
      setNewCardId(data.task.id);
    } catch (e) { setBanner({ type: "error", msg: "Erro ao criar tarefa", detail: e.message }); }
    setProcessing(null);
  }

  async function handleMove(id, target, extraChanges = {}, targetIndex = null) {
    const task = tasks.find(t => t.id === id); if (!task) return;
    // Reordenação na mesma coluna via DnD só é permitida com targetIndex explícito
    if (task.column === target && targetIndex === null) return;

    // "Aguardando" exige texto — abre modal apenas se o campo ainda não estiver preenchido
    if (target === "Aguardando" && extraChanges.aguardando === undefined && !task.aguardando) {
      setAguardandoPending({ id, target });
      return;
    }
    // "Snooze" exige data — abre modal apenas se o campo ainda não estiver preenchido
    if (target === "Snooze" && extraChanges.snoozeUntil === undefined && !task.snoozeUntil) {
      setSnoozePending({ id, target });
      return;
    }

    if (id === newCardId) setNewCardId(null); // remove destaque ao mover

    const sourceCol = task.column;
    const changes = { column: target, ...extraChanges };
    if (target === "Em andamento" && !task.startedAt) changes.startedAt = new Date().toISOString();
    if (target === "Concluído") { changes.completedAt = new Date().toISOString(); changes.duration = calcDuration(task.startedAt || task.createdAt, changes.completedAt); }
    if (sourceCol === "Concluído" && target !== "Concluído") { changes.completedAt = null; changes.duration = null; }
    if (sourceCol === "Aguardando" && target !== "Aguardando") changes.aguardando = "";
    if (sourceCol === "Snooze" && target !== "Snooze") changes.snoozeUntil = null;

    // Snapshot para rollback
    const snapshot = tasks.map(t => ({ id: t.id, column: t.column, ordem: t.ordem,
      startedAt: t.startedAt, completedAt: t.completedAt, duration: t.duration,
      aguardando: t.aguardando, snoozeUntil: t.snoozeUntil }));

    let next = tasks.map(t => t.id === id ? { ...t, ...changes } : t);
    let allPatches = [];

    if (targetIndex !== null) {
      // DnD: insere na posição específica na coluna destino e renumera
      const destTasks = next
        .filter(t => t.column === target && t.id !== id)
        .sort((a, b) => (a.ordem ?? Infinity) - (b.ordem ?? Infinity));
      const movedTask = next.find(t => t.id === id);
      destTasks.splice(targetIndex, 0, movedTask);
      const destOrderById = new Map(destTasks.map((t, i) => [t.id, i + 1]));
      next = next.map(t => destOrderById.has(t.id) ? { ...t, ordem: destOrderById.get(t.id) } : t);
      changes.ordem = destOrderById.get(id);

      // Renumera origem (fecha gap), exceto se é a mesma coluna (já renumerada acima)
      let sourceChanged = [];
      if (sourceCol !== target) {
        const renum = renumberColumn(next, sourceCol, newCardId);
        next = renum.updatedTasks;
        sourceChanged = renum.changed;
      }

      allPatches = [
        api(`/api/tasks/${id}`, { method: "PATCH", body: changes }),
        ...destTasks
          .filter(t => t.id !== id)
          .map(t => api(`/api/tasks/${t.id}`, { method: "PATCH", body: { ordem: destOrderById.get(t.id) } })),
        ...sourceChanged.map(c => api(`/api/tasks/${c.id}`, { method: "PATCH", body: { ordem: c.ordem } })),
      ];
    } else {
      // Caminho clássico: task vai para o fim da coluna destino
      const destSize = tasks.filter(t => t.column === target).length;
      changes.ordem = destSize + 1;
      next = tasks.map(t => t.id === id ? { ...t, ...changes } : t);
      const { updatedTasks: nextAfterRenum, changed: sourceChanged } = renumberColumn(next, sourceCol, newCardId);
      next = nextAfterRenum;

      allPatches = [
        api(`/api/tasks/${id}`, { method: "PATCH", body: changes }),
        ...sourceChanged.map(c => api(`/api/tasks/${c.id}`, { method: "PATCH", body: { ordem: c.ordem } })),
      ];
    }

    setTasks(next);

    try {
      await Promise.all(allPatches);
    } catch (e) {
      setTasks(prev => prev.map(t => {
        const snap = snapshot.find(s => s.id === t.id);
        return snap ? { ...t, ...snap } : t;
      }));
      setBanner({ type: "error", msg: "Erro ao mover tarefa", detail: e.message });
    }
  }

  /* Handlers de DnD para passar ao Column */
  function handleDragStart(id, sourceCol) {
    setDragging({ id, sourceCol });
  }

  function handleDragEnd() {
    setDragging(null);
    setDropTarget(null);
  }

  function handleDrop(id, sourceCol, targetCol, targetIdx) {
    // Bloqueia se coluna está em operação de reordenação em voo
    if (reorderingCol.has(sourceCol) || reorderingCol.has(targetCol)) {
      setDragging(null); setDropTarget(null);
      return;
    }
    // No-op: mesma posição na mesma coluna
    const colTasks = tasks
      .filter(t => t.column === sourceCol)
      .sort((a, b) => (a.ordem ?? Infinity) - (b.ordem ?? Infinity));
    const currentIdx = colTasks.findIndex(t => t.id === id);
    if (sourceCol === targetCol && (targetIdx === currentIdx || targetIdx === currentIdx + 1)) {
      setDragging(null); setDropTarget(null);
      return;
    }
    handleMove(id, targetCol, {}, targetIdx);
    setDragging(null);
    setDropTarget(null);
  }

  /* CHANGED: handleEdit agora recebe tags do formulário e as usa diretamente */
  async function handleEdit(id, { title, description, deadline, tags }) {
    setProcessing(id); const task = tasks.find(t => t.id === id); if (!task) { setProcessing(null); return; }
    try {
      let polished = null;
      try { polished = await api("/api/ai-polish", { method: "POST", body: { title, description, existingTags: allTags, profile } }); } catch {}
      const changes = {
        title: polished?.title || title,
        description: polished?.description || description,
        tags: tags,  /* CHANGED: usa tags do usuário, não da IA */
        deadline,
        priority: null,
        reason: ""
      };
      await api(`/api/tasks/${id}`, { method: "PATCH", body: changes }); updateLocal(id, changes);
    } catch (e) { setBanner({ type: "error", msg: "Erro ao editar tarefa", detail: e.message }); }
    setProcessing(null);
  }

  async function handleImprove(id) {
    setProcessing(id); const task = tasks.find(t => t.id === id); if (!task) { setProcessing(null); return; }
    try {
      const polished = await api("/api/ai-polish", { method: "POST", body: { title: task.title, description: task.description, existingTags: allTags, profile } });
      const changes = { title: polished.title || task.title, description: polished.description || task.description, tags: polished.tags || task.tags };
      await api(`/api/tasks/${id}`, { method: "PATCH", body: changes }); updateLocal(id, changes);
    } catch (e) { setBanner({ type: "error", msg: "Erro ao melhorar tarefa", detail: e.message }); }
    setProcessing(null);
  }

  async function handleReorder(id, direction) {
    const task = tasks.find(t => t.id === id); if (!task) return;
    if (reorderingCol.has(task.column)) return; // bloqueia cliques concorrentes

    // Ordena a coluna pela visão atual (mesma lógica do Column e do renumberColumn)
    const colTasks = [...tasks.filter(t => t.column === task.column)].sort((a, b) => {
      if (a.id === newCardId) return -1;
      if (b.id === newCardId) return 1;
      const oa = a.ordem ?? Infinity;
      const ob = b.ordem ?? Infinity;
      if (oa !== ob) return oa - ob;
      return (a.createdAt || "").localeCompare(b.createdAt || ""); // desempate estável
    });

    const idx = colTasks.findIndex(t => t.id === id);
    const targetIdx = direction === "up" ? idx - 1 : idx + 1;
    if (targetIdx < 0 || targetIdx >= colTasks.length) return;

    // Manipulação de array: remove e insere no novo índice
    const reordered = [...colTasks];
    const [moved] = reordered.splice(idx, 1);
    reordered.splice(targetIdx, 0, moved);

    // Aplica nova ordem (1..N) — persiste toda a coluna para garantir consistência com o Notion
    const newOrderById = new Map();
    const allWithNewOrdem = [];
    reordered.forEach((t, i) => {
      const newOrdem = i + 1;
      newOrderById.set(t.id, newOrdem);
      allWithNewOrdem.push({ id: t.id, ordem: newOrdem });
    });

    // Snapshot para rollback local
    const prevOrderById = new Map(colTasks.map(t => [t.id, t.ordem]));

    // Atualiza estado local imediatamente
    setTasks(prev => prev.map(t =>
      newOrderById.has(t.id) ? { ...t, ordem: newOrderById.get(t.id) } : t
    ));

    // Marca coluna como em operação (bloqueia ↑/↓ e exibe ⏳)
    setReorderingCol(prev => { const s = new Set(prev); s.add(task.column); return s; });

    try {
      await Promise.all(
        allWithNewOrdem.map(c => api(`/api/tasks/${c.id}`, { method: "PATCH", body: { ordem: c.ordem } }))
      );
    } catch (e) {
      // Rollback local. Se algum PATCH teve sucesso e outro falhou, o próximo fetchTasks reconcilia.
      setTasks(prev => prev.map(t =>
        prevOrderById.has(t.id) ? { ...t, ordem: prevOrderById.get(t.id) } : t
      ));
      setBanner({ type: "error", msg: "Erro ao reordenar", detail: e.message });
    } finally {
      setReorderingCol(prev => { const s = new Set(prev); s.delete(task.column); return s; });
    }
  }

  async function handleDelete(id) {
    const task = tasks.find(t => t.id === id); if (!task) return;
    setTasks(prev => prev.filter(t => t.id !== id));
    try { await api(`/api/tasks/${id}`, { method: "DELETE" }); }
    catch (e) { setTasks(prev => [...prev, task]); setBanner({ type: "error", msg: "Erro ao arquivar tarefa", detail: e.message }); }
  }

  function saveProfile(p) { setProfile(p); localStorage.setItem("cofit-profile", JSON.stringify(p)); setShowProfile(false); }

  if (loading) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", color: AU.inkMid, background: AU.bg, fontFamily: "Manrope, sans-serif", fontSize: 14 }}>
      Carregando tarefas do Notion...
    </div>
  );

  if (loadError) return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", height: "100vh", color: AU.inkMid, background: AU.bg, gap: 12, padding: 20, textAlign: "center", fontFamily: "Manrope, sans-serif" }}>
      <span style={{ fontSize: 32 }}>⚠️</span>
      <p style={{ fontSize: 14, fontWeight: 600, color: "#f87171" }}>Erro ao carregar tarefas</p>
      <p style={{ fontSize: 12, color: AU.inkLow, maxWidth: 400, fontFamily: '"JetBrains Mono", ui-monospace, monospace' }}>{loadError}</p>
      <button onClick={fetchTasks} style={btnP}>Tentar novamente</button>
    </div>
  );

  // Busca: filtra tasks quando há query ativa (exclui Concluído da busca)
  const filteredTasks = searchDebounced
    ? tasks.filter(t => t.column !== "Concluído" && taskMatches(t, searchDebounced))
    : tasks;
  const searchResultCount = searchDebounced ? filteredTasks.length : 0;

  const byCols = COLUMNS.map(c => filteredTasks.filter(t => t.column === c));
  const COL_IDX = Object.fromEntries(COLUMNS.map((c, i) => [c, i])); // { Inbox:0, "A fazer":1, … }
  const activeN = tasks.filter(t => t.column !== "Concluído").length;
  const doingN = tasks.filter(t => t.column === "Em andamento").length;
  const doneToday = tasks.filter(t => t.column === "Concluído" && t.completedAt && new Date(t.completedAt).toDateString() === new Date().toDateString()).length;

  /* Colunas disponíveis no mobile: todas (incluindo as "recolhidas" no desktop, que no mobile entram no dropdown) */
  const mobileColName = COLUMNS[mobileCol] || COLUMNS[0];

  return (
    <div>
      {showProfile && <ProfileModal onSave={saveProfile} initial={profile} onClose={profile ? () => setShowProfile(false) : undefined} />}

      {/* ── Modal Aguardando ── */}
      {aguardandoPending && (
        <AguardandoModal
          onConfirm={text => {
            const { id, target } = aguardandoPending;
            setAguardandoPending(null);
            handleMove(id, target, { aguardando: text });
          }}
          onCancel={() => setAguardandoPending(null)}
        />
      )}
      {snoozePending && (
        <SnoozeModal
          onConfirm={date => {
            const { id, target } = snoozePending;
            setSnoozePending(null);
            handleMove(id, target, { snoozeUntil: date });
          }}
          onCancel={() => setSnoozePending(null)}
        />
      )}

      {/* ── Header desktop ── */}
      <header className="desktop-only" style={{ background: AU.surfaceAlt, color: AU.ink, padding: "12px 22px", alignItems: "center", gap: 18, flexWrap: "wrap", borderBottom: `1px solid ${AU.hair}` }}>
        <span style={{ fontFamily: "Fraunces, serif", fontSize: 20, fontWeight: 600, letterSpacing: -0.5, color: AU.ink }}>Cofit</span>
        <span style={{ fontFamily: "Fraunces, serif", fontSize: 12.5, color: AU.inkMid, fontStyle: "italic", letterSpacing: 0.1 }}>Task Manager</span>
        <div style={{ height: 14, width: 1, background: AU.hair }} />
        <div style={{ display: "flex", gap: 18, fontFamily: "Manrope, sans-serif", fontSize: 17, fontWeight: 500 }}>
          <span style={{ color: COL_ACCENT.Snooze }}>
            <strong style={{ fontWeight: 700 }}>{activeN}</strong>
            <span style={{ opacity: 0.8, marginLeft: 5 }}>ativa{activeN !== 1 ? "s" : ""}</span>
          </span>
          <span style={{ color: COL_ACCENT["Em andamento"] }}>
            <strong style={{ fontWeight: 700 }}>{doingN}</strong>
            <span style={{ opacity: 0.8, marginLeft: 5 }}>em andamento</span>
          </span>
          <span style={{ color: COL_ACCENT.Concluído }}>
            <strong style={{ fontWeight: 700 }}>{doneToday}</strong>
            <span style={{ opacity: 0.8, marginLeft: 5 }}>concluída{doneToday !== 1 ? "s" : ""} hoje</span>
          </span>
        </div>
        <SearchInput value={search} onChange={setSearch} count={searchResultCount} mobile={false} />
        <AddForm onAdd={handleAdd} busy={processing === "new"} />
        <div style={{ flex: 1 }} />
        {!searchDebounced && collapsedCols.filter(c => COLLAPSIBLE_COLS.includes(c)).map(c => {
          const idx = COLUMNS.indexOf(c);
          const count = idx >= 0 ? tasks.filter(t => t.column === c).length : 0;
          return <CollapsiblePill key={c} name={c} count={count} onExpand={() => toggleCol(c)} />;
        })}
        <button onClick={fetchTasks} title="Recarregar do Notion" style={{ padding: "5px 11px", borderRadius: 6, border: `1px solid ${AU.hair}`, background: "transparent", color: AU.inkMid, fontSize: 11, fontFamily: "inherit", display: "flex", alignItems: "center", gap: 5, cursor: "pointer" }}>
          <span>🔄</span><span style={{ fontWeight: 600 }}>Recarregar</span>
        </button>
        <button onClick={() => setShowProfile(true)} style={{ padding: "4px 9px", borderRadius: 6, border: `1px solid ${AU.hair}`, background: "transparent", color: AU.inkMid, fontSize: 12, cursor: "pointer" }}>⚙️</button>
      </header>

      {/* ── Header mobile ── */}
      <header className="mobile-only" style={{ background: AU.surfaceAlt, color: AU.ink, padding: "10px 14px", alignItems: "center", gap: 10, borderBottom: `1px solid ${AU.hair}`, flexDirection: "column" }}>
        <div style={{ display: "flex", width: "100%", alignItems: "center", gap: 10 }}>
          <span style={{ fontFamily: "Fraunces, serif", fontSize: 18, fontWeight: 600, letterSpacing: -0.5, color: AU.ink }}>Cofit</span>
          <div style={{ flex: 1 }}>
            <select
              value={mobileCol}
              onChange={e => setMobileCol(Number(e.target.value))}
              style={{ width: "100%", background: AU.surface, color: AU.ink, border: `1px solid ${AU.hair}`, borderRadius: 6, padding: "5px 8px", fontSize: 13, fontFamily: "inherit", fontWeight: 600 }}
            >
              {COLUMNS.map((col, i) => (
                <option key={col} value={i} style={{ background: AU.surface, color: AU.ink }}>
                  {col} ({tasks.filter(t => t.column === col).length})
                </option>
              ))}
            </select>
          </div>
          <button
            onClick={() => { setShowMobileSearch(s => !s); if (showMobileSearch) setSearch(""); }}
            style={{ border: "none", background: search ? statusBg(COL_ACCENT["A fazer"]) : "transparent", color: search ? COL_ACCENT["A fazer"] : AU.inkMid, fontSize: 18, padding: "2px 6px", lineHeight: 1, cursor: "pointer", borderRadius: 6 }}
            title="Buscar"
          >🔍</button>
          <button onClick={fetchTasks} style={{ border: "none", background: "transparent", color: AU.inkMid, fontSize: 18, padding: "2px 4px", lineHeight: 1, cursor: "pointer" }}>🔄</button>
          <button onClick={() => setShowProfile(true)} style={{ border: "none", background: "transparent", color: AU.inkMid, fontSize: 18, padding: "2px 4px", lineHeight: 1, cursor: "pointer" }}>⚙️</button>
        </div>
        {showMobileSearch && (
          <div style={{ width: "100%", paddingBottom: 2 }}>
            <SearchInput value={search} onChange={setSearch} count={searchResultCount} mobile={true} />
          </div>
        )}
      </header>

      {/* ── Conteúdo desktop ── */}
      <div className="desktop-only" style={{ padding: "16px 20px", flexDirection: "column", background: AU.bg, minHeight: "calc(100vh - 42px)" }}>
        <Banner status={banner} onDismiss={() => setBanner(null)} />
        {searchDebounced && filteredTasks.length === 0 ? (
          <div style={{ textAlign: "center", padding: "60px 20px", color: AU.inkLow, fontSize: 14 }}>
            Nenhuma task encontrada para <strong style={{ color: AU.ink }}>"{searchDebounced}"</strong>
          </div>
        ) : (
          <div style={{ display: "flex", gap: 10 }}>
            {COLUMNS.filter(col => !collapsedCols.includes(col)).map((col) => {
              const i = COLUMNS.indexOf(col);
              const isCollapsible = COLLAPSIBLE_COLS.includes(col);
              // Durante busca: oculta colunas sem resultados (exceto Inbox e A fazer, sempre visíveis)
              if (searchDebounced && byCols[i].length === 0 && col !== "Inbox" && col !== "A fazer") return null;
              return <Column key={col} name={col} tasks={byCols[i]} colIndex={i} onMove={handleMove} onEdit={handleEdit} onDelete={handleDelete} onImprove={handleImprove} onReorder={handleReorder} processing={processing} allTags={allTags} onCollapse={searchDebounced ? null : (isCollapsible ? () => toggleCol(col) : null)} newCardId={newCardId} reordering={reorderingCol.has(col)} dragging={dragging} onDropTargetChange={setDropTarget} dropTarget={dropTarget} onDrop={handleDrop} onDragStart={handleDragStart} onDragEnd={handleDragEnd} isMobile={false} />;
            })}
          </div>
        )}
      </div>

      {/* ── Conteúdo mobile ── */}
      <div className="mobile-only" style={{ padding: "12px 12px 80px", flexDirection: "column", background: AU.bg, minHeight: "calc(100vh - 42px)" }}>
        <Banner status={banner} onDismiss={() => setBanner(null)} />
        <Column
          name={mobileColName}
          tasks={byCols[mobileCol]}
          colIndex={mobileCol}
          onMove={handleMove}
          onEdit={handleEdit}
          onDelete={handleDelete}
          onImprove={handleImprove}
          onReorder={handleReorder}
          processing={processing}
          allTags={allTags}
          onCollapse={null}
          newCardId={newCardId}
          reordering={reorderingCol.has(COLUMNS[mobileCol])}
          dragging={null}
          onDropTargetChange={() => {}}
          dropTarget={null}
          onDrop={() => {}}
          onDragStart={null}
          onDragEnd={null}
          isMobile={true}
        />
      </div>

      {/* ── FAB mobile ── */}
      <button className="fab" onClick={() => setShowMobileAdd(true)} aria-label="Nova tarefa">+</button>

      {/* ── Modal de criação mobile ── */}
      {showMobileAdd && (
        <>
          <div className="mobile-add-backdrop" onClick={() => setShowMobileAdd(false)} />
          <div className="mobile-add-modal">
            <p style={{ margin: "0 0 10px", fontSize: 13, fontWeight: 700, color: "#0f172a" }}>Nova tarefa</p>
            <AddForm onAdd={(data) => { handleAdd(data); setShowMobileAdd(false); }} busy={processing === "new"} initialOpen />
          </div>
        </>
      )}
    </div>
  );
}

window.mountApp = function() {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
};

if (window.AUTH_TOKEN) {
  window.mountApp();
}
</script>
</body>
</html>
